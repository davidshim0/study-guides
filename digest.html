ures demonstrate $ρ$Hammer's breakthrough effectiveness: it induces up to 200K+ additional bit flips within 2-hour attack pattern fuzzing processes and has a 112x higher flip rate than the load-based hammering baselines on Comet and Rocket Lake. Also, we are the first to revive Rowhammer attacks on the latest Raptor Lake architecture, where baselines completely fail, achieving stable flip rates of 2,291/min and fast end-to-end exploitation.", "topics": ["Security and Verification in Computing", "Distributed systems and fault tolerance", "Cryptographic Implementations and Security"], "rel": ["dram", "memory", "prefetch"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756042", "oa": "https://arxiv.org/pdf/2510.16544"}, {"venue": "MICRO", "year": 2025, "title": "LATPC: Accelerating GPU Address Translation Using Locality-Aware TLB Prefetching and MSHR Compression", "authors": "Yeonan Ha, Jiho Park, Hanna Cha, Jiwon Lee, Joonsung Kim, Won Woo Ro, Youngsok Kim", "abstract": "", "topics": ["Parallel Computing and Optimization Techniques", "Natural Language Processing Techniques", "Network Packet Processing and Optimization"], "rel": ["address translation", "prefetch", "tlb"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756069", "oa": "https://doi.org/10.1145/3725843.3756069"}, {"venue": "MICRO", "year": 2025, "title": "Re-architecting End-host Networking with CXL: Coherence, Memory, and Offloading", "authors": "Houxiang Ji, Yifan Yuan, Yang Zhou, Ipoom Jeong, Ren Wang, Saksham Agarwal, Nam Sung Kim", "abstract": "", "topics": ["Software-Defined Networks and 5G", "Cloud Computing and Resource Management", "Advanced Optical Network Technologies"], "rel": ["coheren", "cxl", "memory"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756102", "oa": "https://doi.org/10.1145/3725843.3756102"}, {"venue": "MICRO", "year": 2025, "title": "A TRRIP Down Memory Lane: Temperature-Based Re-Reference Interval Prediction For Instruction Caching", "authors": "Henry Kao, Nikhil Sreekumar, Prabhdeep Singh Soni, Ali Sedaghati, Fang Su, Bryan Chan, Maziar Goudarzi, Reza Azimi", "abstract": "Modern mobile CPU software pose challenges for conventional instruction cache replacement policies due to their complex runtime behavior causing high reuse distance between executions of the same instruction. Mobile code commonly suffers from large amounts of stalls in the CPU frontend and thus starvation of the rest of the CPU resources. Complexity of these applications and their code footprint are projected to grow at a rate faster than available on-chip memory due to power and area constraints, making conventional hardware-centric methods for managing instruction caches to be inadequate. We present a novel software-hardware co-design approach called TRRIP (Temperature-based Re-Reference Interval Prediction) that enables the compiler to analyze, classify, and transform code based on \"temperature\" (hot/cold), and to provide the hardware with a summary of code temperature information through a well-defined OS interface based on using code page attributes. TRRIP's lightweight hardware extension employs code temperature attributes to optimize the instruction cache replacement policy resulting in the eviction rate reduction of hot code. TRRIP is designed to be practical and adoptable in real mobile systems that have strict feature requirements on both the software and hardware components. TRRIP can reduce the L2 MPKI for instructions by 26.5% resulting in geomean speedup of 3.9%, on top of RRIP cache replacement running mobile code already optimized using PGO.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Network Packet Processing and Optimization"], "rel": ["cache", "memory", "page"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756110", "oa": "https://doi.org/10.1145/3725843.3756110"}, {"venue": "MICRO", "year": 2025, "title": "Pimba: A Processing-in-Memory Acceleration for Post-Transformer Large Language Model Serving", "authors": "Wonung Kim, Yubin Lee, Yoonsung Kim, Jinwoo Hwang, Seongryong Oh, Jiyong Jung, Aziz Huseynov, Woong Gyu Park", "abstract": "Transformers are the driving force behind today's Large Language Models (LLMs), serving as the foundation for their performance and versatility. Yet, their compute and memory costs grow with sequence length, posing scalability challenges for long-context inferencing. In response, the algorithm community is exploring alternative architectures, such as state space models (SSMs), linear attention, and recurrent neural networks (RNNs), which we refer to as post-transformers. This shift presents a key challenge: building a serving system that efficiently supports both transformer and post-transformer LLMs within a unified framework. To address this challenge, we analyze the performance characteristics of transformer and post-transformer LLMs. Despite their algorithmic differences, both are fundamentally limited by memory bandwidth under batched inference due to attention in transformers and state updates in post-transformers. Further analyses suggest two additional insights: (1) state update operations, unlike attention, incur high hardware cost, making per-bank PIM acceleration inefficient, and (2) different low-precision arithmetic methods offer varying accuracy-area tradeoffs, while we identify Microsoft's MX as the Pareto-optimal choice. Building on these insights, we design Pimba as an array of State-update Processing Units (SPUs), each shared between two banks to enable interleaved access to PIM. Each SPU includes a State-update Processing Engine (SPE) that comprises element-wise multipliers and adders using MX-based quantized arithmetic, enabling efficient execution of state update and attention operations. Our evaluation shows that, compared to LLM-optimized GPU and GPU+PIM systems, Pimba achieves up to 4.1x and 2.1x higher token generation throughput, respectively.", "topics": ["Natural Language Processing Techniques", "Topic Modeling", "Big Data and Digital Economy"], "rel": ["in-memory", "memory", "pim"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756121", "oa": "https://arxiv.org/pdf/2507.10178"}, {"venue": "MICRO", "year": 2025, "title": "CrossBit: Bitwise Computing in NAND Flash Memory with Inter-Bitline Data Communication", "authors": "H. Jin Kim, S. J. Song, Seung-Beum Choi, Jeongin Choe, Sanghyeok Han, Jisung Park, Jinho Lee, Jae‐Joon Kim", "abstract": "", "topics": ["Advanced Data Storage Technologies", "Parallel Computing and Optimization Techniques", "Interconnection Networks and Systems"], "rel": ["flash", "memory", "nand"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756055", "oa": ""}, {"venue": "MICRO", "year": 2025, "title": "ORCHES: Orchestrated Test-Time-Compute-based LLM Reasoning on Collaborative GPU-PIM HEterogeneous System", "authors": "Sixu Li, Yuzhou Chen, Chaojian Li, Yonggan Fu, Zheng Wang, Zhongzhi Yu, Haoran You, Zhifan Ye", "abstract": "Recent breakthroughs in AI reasoning, enabled by test-time compute (TTC) on compact large language models (LLMs), offer great potential for edge devices to effectively execute complex reasoning tasks. However, the intricate inference pipelines associated with TTC pose new efficiency bottlenecks, limiting achievable latency and hindering widespread adoption. Through an in-depth analysis, we identify three key barriers: (1) variable parallelism, characterized by inference-dependent dynamic control flows and varying batch sizes, complicating workload scheduling; (2) branch dependencies, hindering efficient pipelining across sequential reasoning steps; and (3) branch pruning, causing memory fragmentation and irregular data access patterns. Motivated by the memory-bound nature of LLMs and Processing-in-Memory (PIM)'s capability to reduce data movement, we propose ORCHES, a novel GPU-PIM collaborative system specifically designed to address these barriers. ORCHES integrates three key innovations: (1) adaptive workload assignment, dynamically balancing workloads between GPU and PIM units to maximize parallelism despite unpredictable branching; (2) branch-aware pipelining, leveraging speculative execution to substantially reduce inter-step pipeline stalls; and (3) fragmentation-aware memory structuring, enhancing data locality and access efficiency through coordinated caching and optimized memory layout reorganization. Experimental results demonstrate that ORCHES achieves average speedups of 4.16 × and 3.10 × over state-of-the-art (SOTA) GPU implementations for text-based and vision-based reasoning tasks, respectively, without any loss in the accuracy of the original reasoning pipeline.", "topics": ["Software Testing and Debugging Techniques", "Robotics and Automated Systems", "Fuel Cells and Related Materials"], "rel": ["in-memory", "memory", "pim"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756039", "oa": "https://doi.org/10.1145/3725843.3756039"}, {"venue": "MICRO", "year": 2025, "title": "SeaCache: Efficient and Adaptive Caching for Sparse Accelerators", "authors": "X. Li, Jinchen Jiang, Mingyu Gao", "abstract": "Sparse tensor computations are highly memory-bound, making on-chip data reuse in SRAM buffers critical to the performance of domain-specific sparse accelerators.On-demand caches are commonly used in recent sparse accelerators, due to the advantage of easy space allocation and the ability to avoid unnecessary data fetches compared to scratchpad-style data buffering.However, existing cache designs suffer from inefficient space utilization due to the difficulty of fitting variable-length sparse data into fixedsize cache blocks.The theoretically optimal replacement policies used by them also have substantial implementation cost, requiring significant on-chip space to manage the metadata.To address these issues, we propose SeaCache to enable efficient and adaptive caching for sparse accelerators.SeaCache includes three key techniques.First, it incorporates fiber packing and splitting to efficiently map variable-length data into fixed-size cache blocks with high space utilization.Second, it proposes a practical replacement policy that performs similarly to the optimal one but has a much cheaper implementation.Third, it shares the cache space between the actual data and the replacement policy metadata, with a two-phase adaptive mechanism to decide the best partition ratio.Overall, Sea-Cache outperforms state-of-the-art sparse cache designs by 2.8 on average, demonstrating the effectiveness of its novel optimizations.", "topics": ["Advanced Data Storage Technologies", "Caching and Content Delivery", "Parallel Computing and Optimization Techniques"], "rel": ["cache", "memory", "scratchpad"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756040", "oa": "https://dl.acm.org/doi/pdf/10.1145/3725843.3756040"}, {"venue": "MICRO", "year": 2025, "title": "A. Delegato: Locality-Aware Atomic Memory Operations on Chiplets", "authors": "Vı́ctor Soria-Pardos, Adrià Armejach, Tiago Mück, Darío Suárez Gracia, José A. Joao, Miquel Moretó", "abstract": "The irruption of chiplet-based architectures has been a game changer, enabling higher transistor integration and core counts in a single socket. However, chiplets impose higher and non-uniform memory access (NUMA) latencies than monolithic integration. This harms the efficiency of atomic memory operations (AMOs), which are fundamental to implementing fine-grained synchronization and concurrent data structures on large systems. AMOs are executed either near the core (near) or at a remote location within the cache hierarchy (far). On near AMOs, the core’s private cache fetches the target cache line in exclusiveness to modify it locally. Near AMOs cause significant data movement between private caches, especially harming parallel applications’ performance on chiplet-based architectures. Alternatively, far AMOs can alleviate the communication overhead by reducing data movement between processing elements. However, current multicore architectures only support one type of far AMO, which sends all updates to a single serialization point (centralized AMOs). This work introduces two new types of far AMOs, delegated and migrating, that execute AMOs remotely without centralizing updates in a single point of the cache hierarchy. Combining centralized, delegated, and migrating AMOs allows the directory to select the best location to execute AMOs. Moreover, we propose Delegato, a tracing optimization to effectively transport usage information from private caches to the directory to predict the best atomic type to issue accurately. Additionally, we design a simple predictor on top of Delegato that seamlessly selects the best placement to perform AMOs based on the data access pattern and usage activity of cores. Our evaluation using gem5 shows that Delegato can speed up applications on average by 1.07 × over centralized AMOs and by 1.13 × over the state-of-the-art AMO predictor.", "topics": ["Advanced Memory and Neural Computing", "Parallel Computing and Optimization Techniques", "Quantum Computing Algorithms and Architecture"], "rel": ["cache", "memory", "numa"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756030", "oa": "https://upcommons.upc.edu/bitstreams/11143a3e-c050-4d62-8e61-14d752987990/download"}, {"venue": "MICRO", "year": 2025, "title": "Symbiotic Task Scheduling and Data Prefetching", "authors": "Gilead Posluns, Mark C. Jeffrey", "abstract": "Task-parallel programming models enable programmers to extract parallelism from irregular applications.Since software-based taskparallel runtimes impose crippling overheads on fine-grain tasks, architects have designed manycores with hardware support for task management.These hardware task-parallel systems can scale challenging workloads to hundreds of cores, but fail to use conventional prefetchers due to short (100-cycle) tasks.Lacking prefetching, they often expose DRAM latency to applications, fumbling the performance gains of hardware.We present the Task-Seeded Prefetcher (TSP) and Memory Response Task Scheduler (MRS), a symbiotic pair that boost performance in general-purpose task-parallel hardware.TSP learns and prefetches the data-access pattern of each task function, seeded with its descriptor that is queued by the task scheduler.MRS augments the baseline task-to-core dispatch policy by using prefetch status from TSP to optimize core utilization.Together, TSP and MRS provide speedups of up to 3.1 (gmeans up to 1.4) across 13 benchmarks on 256-core task-parallel systems that were already 3-60 faster than parallel software.", "topics": ["Distributed and Parallel Computing Systems", "Parallel Computing and Optimization Techniques", "Graph Theory and Algorithms"], "rel": ["dram", "memory", "prefetch"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756031", "oa": "https://dl.acm.org/doi/pdf/10.1145/3725843.3756031"}, {"venue": "MICRO", "year": 2025, "title": "Citadel: Rethinking Memory Allocation to Safeguard Against Inter-Domain Rowhammer Exploits", "authors": "Anish Saxena, Walter Wang, Alexandros Daglis", "abstract": "Rowhammer is a hardware security vulnerability at the heart of every DRAM-based memory system.Despite its discovery a decade ago, comprehensive defenses in current systems remain elusive, while the probability of successful attacks grows with DRAM density.Hardware-based defenses have proven ineffective due to substantial cost, delays in commercial adoption, and repeated circumventions by attackers, while more flexible software-based solutions incur major performance and memory capacity overheads or offer only limited protection.Citadel is a new memory allocator design that prevents Rowhammer-initiated security exploits by addressing the vulnerability's root cause: physical adjacency of DRAM rows.It introduces flexible security domains and isolates them in physically disjoint memory regions, guaranteeing security by design.On a server system, Citadel supports thousands of security domains at a modest 7.2% average memory overhead and no performance loss, while remaining readily deployable across legacy, contemporary, and future platforms.In contrast, recent domain isolation schemes fail to support many workload scenarios due to excessive overhead and incur 4-6 higher overhead for supported scenarios.", "topics": ["Security and Verification in Computing", "Web Application Security Vulnerabilities", "Advanced Malware Detection Techniques"], "rel": ["allocator", "dram", "memory"], "score": 3, "link": "https://doi.org/10.1145/3725843.3756098", "oa": "https://dl.acm.org/doi/pdf/10.1145/3725843.3756098"}, {"venue": "ASPLOS", "year": 2025, "title": "MoE-Lightning: High-Throughput MoE Inference on Memory-constrained GPUs", "authors": "Shiyi Cao, Shu Liu, Tyler Griggs, Peter Schafhalter, Xiaoxuan Liu, Ying Sheng, Joseph E. Gonzalez, Matei Zaharia", "abstract": "Efficient deployment of large language models, particularly Mixture of Experts (MoE) models, on resource-constrained platforms presents significant challenges in terms of computational efficiency and memory utilization. The MoE architecture, renowned for its ability to increase model capacity without a proportional increase in inference cost, greatly reduces the token generation latency compared with dense models. However, the large model size makes MoE models inaccessible to individuals without high-end GPUs. In this paper, we propose a high-throughput MoE batch inference system, MoE-Lightning, that significantly outperforms past work. MoE-Lightning introduces a novel CPU-GPU-I/O pipelining schedule, CGOPipe, with paged weights to achieve high resource utilization, and a performance model, HRM, based on a Hierarchical Roofline Model we introduce to help find policies with higher throughput than existing systems. MoE-Lightning can achieve up to (10.3x) higher throughput than state-of-the-art offloading-enabled LLM inference systems for Mixtral 8x7B on a single T4 GPU (16GB). When the theoretical system throughput is bounded by the GPU memory, MoE-Lightning can reach the throughput upper bound with 2-3x less CPU memory, significantly increasing resource utilization. MoE-Lightning also supports efficient batch inference for much larger MoEs (e.g., Mixtral 8x22B and DBRX) on multiple low-cost GPUs (e.g., 2--4 T4s).", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Neural Network Applications", "Advanced Data Storage Technologies"], "rel": ["memory", "page"], "score": 2, "link": "https://doi.org/10.1145/3669940.3707267", "oa": "https://doi.org/10.1145/3669940.3707267"}, {"venue": "ASPLOS", "year": 2025, "title": "Instruction-Aware Cooperative TLB and Cache Replacement Policies", "authors": "Dimitrios Chasapis, Georgios Vavouliotis, Daniel A. Jiménez, Marc Casas", "abstract": "Modern server and data center applications are characterized not only by big datasets, but also by large instruction footprints that incur frequent cache and Translation Lookaside Buffer (TLB) misses due to instruction accesses. Instruction TLB misses are particularly problematic since they cause pipeline stalls that significantly harm performance.", "topics": ["Caching and Content Delivery", "Advanced Data Storage Technologies", "Parallel Computing and Optimization Techniques"], "rel": ["cache", "tlb"], "score": 2, "link": "https://doi.org/10.1145/3669940.3707247", "oa": ""}, {"venue": "ASPLOS", "year": 2025, "title": "OctoCache: Caching Voxels for Accelerating 3D Occupancy Mapping in Autonomous Systems", "authors": "Peiqing Chen, Minghao Li, Zishen Wan, Yu-Shun Hsiao, Minlan Yu, Vijay Janapa Reddi, Zaoxing Liu", "abstract": "3D mapping systems are crucial for creating digital representations of physical environments, widely used in autonomous robot navigation, 3D visualization, and AR/VR. This paper focuses on OctoMap, a leading 3D mapping framework using an octree-based structure for spatial efficiency. However, OctoMap's performance is limited by slow updates due to costly memory accesses. We introduce OctoCache, a software system that accelerates OctoMap through (1) optimized cache memory access, (2) refined voxel ordering, and (3) workflow parallelization. OctoCache achieves speedups of 45.63%~88.01% in 3D environment construction tasks compared to standard OctoMap. Deployed in UAV navigation scenarios, OctoCache demonstrates up to 3.02× speedup and reduces mission completion time by up to 28%. These results highlight OctoCache's potential to enhance 3D mapping efficiency in autonomous navigation, advancing robotics and environmental modeling.", "topics": ["Robotics and Sensor-Based Localization", "3D Modeling in Geospatial Applications", "Augmented Reality Applications"], "rel": ["cache", "memory"], "score": 2, "link": "https://doi.org/10.1145/3676641.3716263", "oa": "https://doi.org/10.1145/3676641.3716263"}, {"venue": "ASPLOS", "year": 2025, "title": "Reload+Reload: Exploiting Cache and Memory Contention Side Channel on AMD SEV", "authors": "Li-Chung Chiang, Shih-Wei Li", "abstract": "To enhance the security of virtual machines (VMs) in multi-tenant cloud environments, AMD provides the Secure Encrypted Virtualization (SEV) extension to support encrypted VMs. We discovered two previously unknown side channels from AMD processors with SEV support: cache flush and memory contention side channels. Our findings apply to SEV-SNP and earlier versions of the technology (SEV and SEV-ES). We formulated two Reload+Reload (RR) attacks based on our two respective findings: Reload+Reload-flush-set (RRFS) and Reload+Reload-memory-block (RRMB). We demonstrated the effectiveness of the attacks against SEV-SNP protected VMs: we built a RRFS-based covert channel for a Spectre attack and used RRMB for extracting AES-128 secret keys. Compared to Prime+Probe-based implementations, our RRFS-based covert channel demonstrates superior noise resistance and higher capacity.", "topics": ["Security and Verification in Computing", "Advanced Memory and Neural Computing", "Distributed systems and fault tolerance"], "rel": ["cache", "memory"], "score": 2, "link": "https://doi.org/10.1145/3676641.3716017", "oa": "https://dl.acm.org/doi/pdf/10.1145/3676641.3716017?download=true"}, {"venue": "ASPLOS", "year": 2025, "title": "CIPHERMATCH: Accelerating Homomorphic Encryption-Based String Matching via Memory-Efficient Data Packing and In-Flash Processing", "authors": "Mayank Kabra, Rakesh Nadig, Harshita Gupta, Rahul Bera, Manos Frouzakis, Vamanan Arulchelvan, Yu Liang, Haiyu Mao", "abstract": "Homomorphic encryption (HE) allows secure computation on encrypted data without revealing the original data, providing significant benefits for privacy-sensitive applications. Many cloud computing applications (e.g., DNA read mapping, biometric matching, web search) use exact string matching as a key operation. However, prior string matching algorithms that use homomorphic encryption are limited by high computational latency caused by the use of complex operations and data movement bottlenecks due to the large encrypted data size. In this work, we provide an efficient algorithm-hardware codesign to accelerate HE-based secure exact string matching. We propose CIPHERMATCH, which (i) reduces the increase in memory footprint after encryption using an optimized software-based data packing scheme, (ii) eliminates the use of costly homomorphic operations (e.g., multiplication and rotation), and (iii) reduces data movement by designing a new in-flash processing (IFP) architecture.", "topics": ["Cryptography and Data Security", "Advanced Data Storage Technologies", "Algorithms and Data Compression"], "rel": ["flash", "memory"], "score": 2, "link": "https://doi.org/10.1145/3676641.3716251", "oa": "http://hdl.handle.net/20.500.11850/731960"}, {"venue": "ASPLOS", "year": 2025, "title": "Virtuoso: Enabling Fast and Accurate Virtual Memory Research via an Imitation-based Operating System Simulation Methodology", "authors": "Konstantinos Kanellopoulos, Konstantinos Sgouras, F. Nisa Bostancı, Andreas Kosmas Kakolyris, Berkin Kerim Konar, Rahul Bera, Mohammad Sadrosadati, Rakesh Kumar", "abstract": "The unprecedented growth in data demand from emerging applications has turned virtual memory (VM) into a major performance bottleneck. VM's overheads are expected to persist as memory requirements continue to increase. Researchers explore new hardware/OS co-designs to optimize VM across diverse applications and systems. To evaluate such designs, researchers rely on various simulation methodologies to model VM components. Unfortunately, current simulation tools (i) either lack the desired accuracy in modeling VM's software components or (ii) are too slow and complex to prototype and evaluate schemes that span across the hardware/software boundary.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Distributed and Parallel Computing Systems"], "rel": ["memory", "virtual memory"], "score": 2, "link": "https://doi.org/10.1145/3676641.3716027", "oa": "http://hdl.handle.net/20.500.11850/731963"}, {"venue": "HPCA", "year": 2025, "title": "SoMa: Identifying, Exploring, and Understanding the DRAM Communication Scheduling Space for DNN Accelerators", "authors": "Jingwei Cai, Xuan Wang, Mingyu Gao, Sen Peng, Zijian Zhu, Yuchen Wei, Zuotong Wu, Kaisheng Ma", "abstract": "Modern Deep Neural Network (DNN) accelerators are equipped with increasingly larger on-chip buffers to provide more opportunities to alleviate the increasingly severe DRAM bandwidth pressure. However, most existing research on buffer utilization still primarily focuses on single-layer dataflow scheduling optimization. As buffers grow large enough to accommodate most single-layer weights in most networks, the impact of single-layer dataflow optimization on DRAM communication diminishes significantly. Therefore, developing new paradigms that fuse multiple layers to fully leverage the increasingly abundant onchip buffer resources to reduce DRAM accesses has become particularly important, yet remains an open challenge.To address this challenge, we first identify the optimization opportunities in DRAM communication scheduling by analyzing the drawbacks of existing works on the layer fusion paradigm and recognizing the vast optimization potential in scheduling the timing of data prefetching from and storing to DRAM. To fully exploit these optimization opportunities, we develop a Tensor-centric Notation and its corresponding parsing method to represent different DRAM communication scheduling schemes and depict the overall space of DRAM communication scheduling. Then, to thoroughly and efficiently explore the space of DRAM communication scheduling for diverse accelerators and workloads, we develop an end-to-end scheduling framework, SoMa, which has already been developed into a compiler for our commercial accelerator product. Compared with the state-of-the-art (SOTA) Cocco framework, SoMa achieves, on average, a 2.11× performance improvement and a 37.3% reduction in energy cost simultaneously. Then, we leverage SoMa to study optimizations for LLM, perform design space exploration (DSE), and analyze the DRAM communication scheduling space through a practical example, yielding some interesting insights. Moreover, SoMa has been open-sourced at https://github.com/SET-Scheduling-Project/SoMa-HPCA2025.", "topics": ["Radiation Effects in Electronics", "Energy Harvesting in Wireless Networks", "Particle Detector Development and Performance"], "rel": ["dram", "prefetch"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00048", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "AsyncDIMM: Achieving Asynchronous Execution in DIMM-Based Near-Memory Processing", "authors": "Liyan Chen, Dongxu Lyu, Jianfei Jiang, Qin Wang, Zhigang Mao, Naifeng Jing", "abstract": "DIMM-based near-memory processing (NMP) architectures address the “memory wall” problem by incorporating near-memory accelerators (NMAs) into main memory devices for high memory bandwidth and low energy consumption. However, critical challenges prevent efficient asynchronous execution between host and NMAs in DIMM-NMP architectures. Memory controllers (MCs) distributed at the host side and the NMA side issue memory accesses independently without synchronization on memory states, which may lead to memory bus contention and DRAM errors. Therefore, most existing DIMM-NMP designs adopt synchronous execution to prevent concurrent memory accesses. However, this intervention wastes either the host or the NMA computation capability. In this work, we propose AsyncDIMM, a novel DIMM-NMP design with efficient asynchronous execution based on existing memory buses. It enables single access mode (host or NMA), concurrent access mode, and a seamless switch between them. First, we propose the offload-schedule-return mechanism with explicit and implicit synchronization to ensure memory access correctness for all memory modes. Second, to further improve bandwidth utilization and decrease access latency, we introduce optimized timing constraints for offloading, a locality-aware switch-recovery method for scheduling, and adaptive batch with timing-division multiplexing notification for returning. Finally, we present a detailed design with limited hardware modifications to conventional host and NMA MCs, which is extensively validated on the FPGA. Comprehensive experiments demonstrate that AsyncDIMM outperforms four NMP baselines by $1.19 \\times-1.92 \\times$, enabling efficient asynchronous execution with up to $2.25 \\times$ bandwidth utilization uplift and 47% access latency reduction.", "topics": ["Parallel Computing and Optimization Techniques", "Semiconductor materials and devices", "Advanced Memory and Neural Computing"], "rel": ["dram", "memory"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00047", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Gaze into the Pattern: Characterizing Spatial Patterns with Internal Temporal Correlations for Hardware Prefetching", "authors": "Zixiao Chen, Chentao Wu, Yunfei Gu, Ranhao Jia, Jie Li, Minyi Guo", "abstract": "Hardware prefetching is one of the most widely-used techniques for hiding long data access latency. To address the challenges faced by hardware prefetching, architects have proposed to detect and exploit the spatial locality at the granularity of spatial region. When a new region is activated, they try to find similar previously accessed regions for footprint prediction based on system-level environmental features such as the trigger instruction or data address. However, we find that such context-based prediction cannot capture the essential characteristics of access patterns, leading to limited flexibility, practicality and suboptimal prefetching performance. In this paper, inspired by the temporal property of memory accessing, we note that the temporal correlation exhibited within the spatial footprint is a key feature of spatial patterns. To this end, we propose Gaze, a simple and efficient hardware spatial prefetcher that skillfully utilizes footprint-internal temporal correlations to efficiently characterize spatial patterns. Meanwhile, we observe a unique unresolved challenge in utilizing spatial footprints generated by spatial streaming, which exhibit extremely high access density. Therefore, we further enhance Gaze with a dedicated two-stage approach that mitigates the over-prefetching problem commonly encountered in conventional schemes. Our comprehensive and diverse set of experiments show that Gaze can effectively enhance the performance across a wider range of scenarios. Specifically, Gaze improves performance by $\\mathbf{5. 7 \\%}$ and 5.4% at single-core, 11.4% and $\\mathbf{8. 8 \\%}$ at eight-core, compared to most recent low-cost solutions PMP and vBerti.", "topics": ["Data Visualization and Analytics", "Multimedia Communication and Technology"], "rel": ["memory", "prefetch"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00024", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Let-Me-In: (Still) Employing In-pointer Bounds Metadata for Fine-grained GPU Memory Safety", "authors": "Jaewon Lee, Edward Chung, Saurabh Singh, Seonjin Na, Yonghae Kim, Jaekyu Lee, Hyesoon Kim", "abstract": "The importance of ensuring the robustness of GPU systems has grown significantly, especially as GPUs have become vital in critical decision-making systems such as autonomous driving and medical diagnostics. However, GPU programming languages, primarily based on $\\mathrm{C} / \\mathrm{C}++$, inherit memory vulnerabilities that threaten the robustness of GPU applications. The heterogeneous GPU memory hierarchy makes it more difficult to find effective universal solutions. While several studies have proposed advanced GPU memory safety mechanisms, they still grapple with significant challenges, including substantial metadata storage and access overhead, elevated hardware implementation costs, and limited security coverage, particularly regarding fine-grained memory safety. We address this issue with Let-Me-In (LMI), a fine-grained memory safety mechanism specifically designed for GPUs. LMI features an efficient hardware bounds-checking mechanism that ensures negligible impact on performance and hardware costs, even in scenarios where thousands of concurrent threads perform memory operations across buffers in heap and local memory. This is achieved by aligning memory allocation to powers of two and performing static analysis to identify and mark pointer arithmetic instructions. This approach also enables storing metadata inside the unused upper bits of pointers, which are shrinking due to the expansion of the virtual memory address space. The unique characteristics of GPU programs make this approach feasible, unlike in CPU programs, where the inherent complexity of programs poses challenges. Our evaluation shows that LMI incurs only negligible hardware and performance overhead, making it a practical and efficient solution for enhancing GPU memory safety.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Neural Network Applications", "Scientific Computing and Data Management"], "rel": ["memory", "virtual memory"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00122", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "CROSS: Compiler-Driven Optimization of Sparse DNNs Using Sparse/Dense Computation Kernels", "authors": "Fangxin Liu, Shiyuan Huang, Ning Yang, Zongwu Wang, Haoming Li, Li Jiang", "abstract": "As deep learning models continue to grow larger and more complex, exploiting sparsity is becoming one of the most critical areas for enhancing efficiency and scalability. Several methods for leveraging sparsity have been proposed to more effectively balance the trade-off between compression ratio and accuracy. While these methods offer algorithmic advantages, they also introduce significant hardware overhead due to index-based encoding and decoding. In this paper, we propose CROSS, an end-to-end compilation optimization technique to achieve sparse DNN acceleration using GPU computation kernels. The key insight behind CROSS is to exploit parameter distribution locality and reconcile the “sparse” DNN computation with the high-performance “dense” computation kernels. Specifically, we perform an in-depth analysis of sparse operations in mainstream DNN computing frameworks. We then decompose the sparse workload into multiple components to create highly efficient, specialized operators with different sparsity levels. Additionally, we introduce a novel sparse graph translation technique to facilitate computation kernel processing of the sparse workload. The resulting CROSS framework can accommodate various sparsity patterns and optimization techniques, delivering an average $2.03 \\times$ speedup on inference latency compared to seven state-of-the-art solutions with smaller memory footprints across various models and datasets.", "topics": ["Brain Tumor Detection and Classification", "Advanced Neural Network Applications", "Human Pose and Action Recognition"], "rel": ["kernel", "memory"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00076", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Variable Read Disturbance: An Experimental Analysis of Temporal Variation in DRAM Read Disturbance", "authors": "Ataberk Olgun, F. Nisa Bostancı, İsmail Emir Yüksel, Oğuzhan Canpolat, Haocong Luo, Geraldo F. Oliveira, A. Giray Yağlıkçı, Minesh Patel", "abstract": "Modern DRAM chips are subject to read disturbance errors. These errors manifest as security-critical bitflips in a victim DRAM row that is physically nearby a repeatedly activated (opened) aggressor row (RowHammer) or an aggressor row that is kept open for a long time (RowPress). State-of-the-art read disturbance mitigations rely on accurate and exhaustive characterization of the read disturbance threshold ($R D T$) (e.g., the number of aggressor row activations needed to induce the first RowHammer or RowPress bitflip) of every DRAM row (of which there are millions or billions in a modern system) to prevent read disturbance bitflips securely and with low overhead. We experimentally demonstrate for the first time that the RDT of a DRAM row significantly and unpredictably changes over time. We call this new phenomenon variable read disturbance (VRD). Our extensive experiments using 160 DDR4 chips and 4 HBM2 chips from three major manufacturers yield three key observations. First, it is very unlikely that relatively few RDT measurements can accurately identify the RDT of a DRAM row. The minimum RDT of a DRAM row appears after tens of thousands of measurements (e.g., up to 94,467), and the minimum RDT of a DRAM row is $3.5 \\times$ smaller than the maximum RDT observed for that row. Second, the probability of accurately identifying a row’s RDT with a relatively small number of measurements reduces with increasing chip density or smaller technology node size. Third, data pattern, the amount of time an aggressor row is kept open, and temperature can affect the probability of accurately identifying a DRAM row’s RDT. Our empirical results have implications for the security guarantees of read disturbance mitigation techniques: if the RDT of a DRAM row is not identified accurately, these techniques can easily become insecure. We discuss and evaluate using a guardband for RDT and error-correcting codes for mitigating read disturbance bitflips in the presence of RDTs that change unpredictably over time. We conclude that $a\\gt 10 \\%$ guardband for the minimum observed RDT combined with SECDED or Chipkill-like SSC error-correcting codes could prevent read disturbance bitflips at the cost of large read disturbance mitigation performance overheads (e.g., 45% performance loss for an RDT guardband of $50 \\%$). We hope and believe future work on efficient online profiling mechanisms and configurable read disturbance mitigation techniques could remedy the challenges imposed on today’s read disturbance mitigations by the variable read disturbance phenomenon.", "topics": ["Advanced Memory and Neural Computing", "Semiconductor materials and devices", "Ferroelectric and Negative Capacitance Devices"], "rel": ["dram", "hbm"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00069", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "FHENDI: A Near-DRAM Accelerator for Compiler-Generated Fully Homomorphic Encryption Applications", "authors": "Yongmo Park, Aporva Amarnath, Subhankar Pal, Karthik Swaminathan, Alper Buyuktosunoglu, Hayim Shaul, Ehud Aharoni, Nir Drucker", "abstract": "Fully homomorphic encryption (FHE) is a powerful cryptographic technique that enables computation on encrypted data without needing to decrypt it. It has broad applications in scenarios where sensitive data needs to be processed in the cloud or in other untrusted environments. FHE applications are both compute- and memory-intensive, owing to expensive operations on large data. While prior works address the challenges of efficient compute using dedicated hardware, expensive memory transfers still remain a major limiting factor. In this work, we propose a hierarchical near-DRAM processing (NDP) solution for FHE applications, called FHENDI, that harnesses the massive DRAM bank bandwidth. We observe various data access patterns in FHE that reveal distinct levels of parallelism: element-wise, limb-wise, coefficient-wise, and ciphertext-wise. FHENDI exploits these levels of parallelism to map FHE operations and data onto different hierarchies of our design, while addressing three major challenges with NDP for FHE: (i) the lack of bank-to-bank communication support, (ii) limited die-to-die bandwidth, and (iii) large memory access latencies. We resolve the first problem through a novel, conflict-free mapping algorithm built atop localized permutation networks that enables efficient element-wise and butterfly operations in FHE. The second problem is addressed by pipelining the execution of parallel bootstrap operations observed in compiled FHE workloads. Finally, we hide the memory access latency behind computation latency by exploiting a dual-banking scheme and subarray-level parallelism (SLP) of the DRAM banks. We evaluate FHENDI using representative workloads in the domains of privacy-preserving machine learning inference on CNNs and Transformers, database range query, and sorting, that are obtained using a compiler framework called HElayers. We compare FHENDI with a server-class CPU and GPU running the state-of-the-art HEaaN library, and an FHE accelerator ASIC, and report mean speedups of $2145.8 \\times, 118.29 \\times$, and $2.45 \\times$, respectively.", "topics": ["Cryptography and Data Security", "Advanced Data Storage Technologies", "Cryptographic Implementations and Security"], "rel": ["dram", "memory"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00087", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "AutoRFM: Scaling Low-Cost in-DRAM Trackers to Ultra-Low Rowhammer Thresholds", "authors": "Moinuddin K. Qureshi", "abstract": "In-DRAM Rowhammer mitigation has the potential to solve the Rowhammer problem without relying on other parts of the system. In-DRAM mitigation requires space (to identify the aggressor rows) and time (to perform the victim refresh). To reduce the storage overheads of tracking, recent works have developed secure low-cost in-DRAM trackers that can probabilistically identify aggressor rows. To obtain the time required for mitigation, these trackers rely on the Refresh Management (RFM) command introduced in DDR5. As RFM stalls the bank for a latency of 200ns-400ns, frequent use of RFM can cause significant slowdowns. For example, scaling the recent MINT tracker to a threshold of 100 incurs 33% slowdown. The goal of this paper is to enable low-cost trackers to tolerate ultralow thresholds (sub-100) while incurring negligible slowdown. This paper proposes AutoRFM, a transparent RFM mechanism that can provide mitigation time to the DRAM chips without stalling the bank. The key insight in AutoRFM is to leverage the subarray structure (e.g. each bank contains 256 subarrays) and perform mitigation on only one of the subarrays. Operations to all subarrays that are not under mitigation are serviced without any interruption. If activation occurs to the subarray under mitigation, the DRAM chip sends an ALERT signal informing the Memory Controller to retry after a predefined time. As AutoRFM works best if consecutive requests to the same bank do not get mapped to the same subarray, we use Randomized Memory Mapping to break the spatial correlation between memory accesses. Furthermore, we also develop a Fractal Mitigation Algorithm that can tolerate transitive attacks (such as Half-Double) without requiring recursive mitigations to the same subarray. Our design ensures that a declined request does not have to wait more than 200 ns before retrying, thus limiting the slowdown and avoiding any potential for denial of service. Our evaluations, with SPEC, GAP, and stream workloads, show that AutoRFM enables low-cost trackers to tolerate a threshold of as low as 74 while incurring an average slowdown of only 3.1%.", "topics": ["Analog and Mixed-Signal Circuit Design", "Sparse and Compressive Sensing Techniques", "CCD and CMOS Imaging Sensors"], "rel": ["dram", "memory"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00078", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "SPARK: Sparsity Aware, Low Area, Energy-Efficient, Near-memory Architecture for Accelerating Linear Programming Problems", "authors": "Siddhartha Raman Sundara Raman, Lizy K. John, Jaydeep P. Kulkarni", "abstract": "Integer Linear Programming (ILP) is an important mathematical approach for solving time-sensitive real-life optimization problems, including network routing, map routing, traffic scheduling, etc. However, the algorithms for solving ILPs are typically sparse and branch-intensive, and not CPU/GPU friendly. In the paper “What could a million cores do to solve Integer programs”, Koch et al. [40] presented data illustrating that Integer Linear Programming (ILP) applications take tens of hours of execution time even on the largest parallel computers. Long execution time is a problem because many real-life applications need a decision in seconds or minutes. The widely used ILP solvers, like Gurobi (optimized for CPUs), perform software-based optimizations to handle the inherent sparsity in ILPs but still do not meet decision threshold because of the limited throughput of CPUs. GPUs are suited for large-sized dot-product compute, however, GPU-based ILP solvers also do not meet decision thresholds as (i) GPU is not sparsity friendly and (ii) GPU incurs thread divergence for branching, resulting in under-utilization of streaming engines and periodic host-GPU interaction. We propose SPARK, a sparsity-aware, reuse-aware, energy-efficient, reconfigurable, near-cache ILP architecture that (i) re-configures the existing L1 cache present in CPUs to perform near-cache acceleration with easy integration into the baseline CPU pipeline with minimal area overhead ($\\sim 1.4 \\%$ of a CPU), (ii) performs near-cache sparsity detection and sparsity-aware compute, reducing the number of insignificant computations, and data movement energy overheads, (iii) leverages the computational patterns present in algorithms used for solving ILP to realize a reuse-aware architecture, and (iv) is applicable to solving sparse and dense ILPs and LPs (Linear Programs). We observe $15 x / 20 x$, and $152 x / 740 x$ performance/energy improvement over AMD’s Zen3 CPU, and Nvidia’s Tesla v100 GPU for sparse reallife ILPs in Mixed Integer Programming library (MIPLIB 2017). For sparse LPs (non-integer), SPARK achieves 7-17x/103-250x performance/energy improvement over CPU/ GPU indicating SPARK’s broad applicability.", "topics": ["Parallel Computing and Optimization Techniques", "Embedded Systems Design Techniques", "Advanced Optimization Algorithms Research"], "rel": ["cache", "memory"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00019", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Understanding RowHammer Under Reduced Refresh Latency: Experimental Analysis of Real DRAM Chips and Implications on Future Solutions", "authors": "Yahya Can Tuğrul, A. Giray Yağlıkçı, İsmail Emir Yüksel, Ataberk Olgun, Oğuzhan Canpolat, Nisa Bostancı, Mohammad Sadrosadati, Oğuz Ergin", "abstract": "Read disturbance in modern DRAM chips is a widespread weakness that is used for breaking memory isolation, one of the fundamental building blocks of system security and privacy. RowHammer is a prime example of read disturbance in DRAM where repeatedly accessing (hammering) a row of DRAM cells (DRAM row) induces bitflips in physically nearby DRAM rows (victim rows). Unfortunately, shrinking technology node size exacerbates RowHammer and as such, significantly fewer accesses can induce bitflips in newer DRAM chip generations. To ensure robust DRAM operation, state-of-the-art mitigation mechanisms restore the charge in potential victim rows (i.e., they perform preventive refresh or charge restoration). With newer DRAM chip generations, these mechanisms perform preventive refresh more aggressively and cause larger performance, energy, or area overheads. Therefore, it is essential to develop a better understanding and in-depth insights into the preventive refresh to secure real DRAM chips at low cost. In this paper, our goal is to mitigate RowHammer at low cost by understanding the preventive refresh latency and the impact of reduced refresh latency on RowHammer. To this end, we present the first rigorous experimental study on the interactions between refresh latency and RowHammer characteristics in real DRAM chips. Our experimental characterization using 388 real DDR4 DRAM chips from three major manufacturers demonstrates that a preventive refresh latency can be significantly reduced (by 64%) at the expense of requiring slightly more (by 0.54%) preventive refreshes. To investigate the impact of reduced preventive refresh latency on system performance and energy efficiency, we reduce the preventive refresh latency and adjust the aggressiveness of existing RowHammer solutions by developing a new mechanism, Partial Charge Restoration for Aggressive Mitigation (PaCRAM). Our results show that by reducing the preventive refresh latency, PaCRAM reduces the performance and energy overheads induced by five state-of-the-art RowHammer mitigation mechanisms with small additional area overhead. Thus, PaCRAM introduces a novel perspective into addressing RowHammer vulnerability at low cost by leveraging our experimental observations. To aid future research, we open-source our PaCRAM implementation at https://github.com/CMU-SAFARI/PaCRAM.", "topics": ["Advanced Data Storage Technologies", "Green IT and Sustainability", "3D IC and TSV technologies"], "rel": ["dram", "memory"], "score": 2, "link": "https://doi.org/10.1109/hpca61900.2025.00070", "oa": ""}, {"venue": "ISCA", "year": 2025, "title": "Avalanche: Optimizing Cache Utilization via Matrix Reordering for Sparse Matrix Multiplication Accelerator", "authors": "Gwangeun Byeon, Seongwook Kim, H. Kim, Sukhyun Han, JinKwon Kim, Prashant J. Nair, Taewook Kang, Seokin Hong", "abstract": "Sparse Matrix Multiplication (SpMM) is essential in various scientific and engineering applications but poses significant challenges due to irregular memory access patterns.Many hardware accelerators have been proposed to accelerate SpMM.However, they have yet to focus on on-chip memory utilization.In this paper, we highlight the underutilization of the on-chip memory in the SpMM accelerators.Then we propose Avalanche, a novel hardware accelerator that optimally utilizes the on-chip memory to efficiently cache both matrices and .Avalanche incorporates three key techniques: Matrix Reordering (Mat-Reorder), Dead-Product Early Eviction (DP-Evict), and Reuse Distance-Aware Matrix Caching (RM-Caching).Mat-Reorder enhances data locality by reordering the columns of matrix , ensuring early completion of computations for matrix .DP-Evict optimizes on-chip memory usage by promptly evicting fully computed (dead) products from on-chip memory.RM-Caching maximizes data reuse by caching frequently accessed elements of matrix based on their reuse distance.Experimental results demonstrate that Avalanche achieves an average performance improvement of 1.97 compared to the state-of-theart SpMM accelerator, with a chip area of 6.15 mm 2 CCS Concepts", "topics": ["Parallel Computing and Optimization Techniques", "Interconnection Networks and Systems", "Quantum Computing Algorithms and Architecture"], "rel": ["cache", "memory"], "score": 2, "link": "https://doi.org/10.1145/3695053.3730990", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3730990"}, {"venue": "ISCA", "year": 2025, "title": "Ecco: Improving Memory Bandwidth and Capacity for LLMs via Entropy-Aware Cache Compression", "authors": "Feng Cheng, Cong Guo, Chiyue Wei, Junyao Zhang, Changchun Zhou, Edward Hanson, Jiaqi Zhang, Xiaoxiao Liu", "abstract": "", "topics": ["Advanced Data Storage Technologies", "Algorithms and Data Compression", "Parallel Computing and Optimization Techniques"], "rel": ["cache", "memory"], "score": 2, "link": "https://doi.org/10.1145/3695053.3731024", "oa": "https://doi.org/10.1145/3695053.3731024"}, {"venue": "ISCA", "year": 2025, "title": "MagiCache: A Virtual In-Cache Computing Engine", "authors": "Renhao Fan, Yikai Cui, Weike Li, Mingyu Wang, Zhaolin Li", "abstract": "The rise of data-parallel applications poses a significant challenge to the energy consumption of computing architectures.In-cache computation is a promising solution for achieving high parallelism and energy efficiency because it can eliminate data movement between the cache and the processor.Existing in-cache computing architectures transform a portion of cache arrays into computing arrays, with all rows of these arrays serving as computing lines.The remaining cache arrays are used as cachelines to store the data required by computing arrays or processors.However, in these array-level in-cache computing architectures, only a few computing lines in each computing array are active at runtime while the others are idle, which incurs severe cache capacity loss and space underutilization.In addition, bursty memory accesses of data-parallel applications also cause significant in-cache data movement latency.To address these problems, we propose MagiCache, a virtual in-cache computing engine.First, we design a novel cacheline-level in-cache computing architecture in which each cache array can configure some rows as computing lines and the other rows as cachelines with negligible overhead.Second, a virtual engine is further designed on this novel architecture to dynamically allocate different rows of each array as computing lines or cachelines based on runtime computation and storage requirements, thus realizing efficient cacheline-level space management.Finally, we present an instruction chaining technique to overlap the bursty access latency by enabling asynchronous execution of computing arrays.Evaluation results show that MagiCache achieves a 1.19x-1.61xspeedup over the state-of-the-art in-cache computing architectures with 6.5 KB of additional storage.Our cacheline-level space", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Cloud Computing and Resource Management"], "rel": ["cache", "memory"], "score": 2, "link": "https://doi.org/10.1145/3695053.3731113", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731113"}, {"venue": "ISCA", "year": 2025, "title": "Rethinking Prefetching for Intermittent Computing", "authors": "Gan Fang, Jianping Zeng, Aditya Gupta, Changhee Jung", "abstract": "Prefetching improves performance by reducing cache misses.However, conventional prefetchers are too aggressive to serve batteryless energy harvesting systems (EHSs) where energy efficiency is the utmost design priority due to weak input energy and the resulting frequent outages.To this end, this paper proposes IPEX, an Intermittence-aware Prefetching EXtension that can be integrated into existing prefetchers on EHSs.IPEX aims to avert useless prefetches by suppressing the prefetching of the cache blocks receiving no hit before their loss on power failure, which would otherwise waste harvested energy.At a proper moment before an upcoming outage, IPEX throttles the prefetch degree to target only those blocks that are likely to be used before the outage.That way IPEX saves energy and spends it on making further execution progress.Experimental results show that on average, IPEX reduces energy consumption by 7.86% (up to 21.64%) and improves performance by 8.96% (up to 23.49%) compared to a conventional prefetcher.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Opportunistic and Delay-Tolerant Networks"], "rel": ["cache", "prefetch"], "score": 2, "link": "https://doi.org/10.1145/3695053.3731038", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731038"}, {"venue": "ISCA", "year": 2025, "title": "NMP-PaK: Near-Memory Processing Acceleration of Scalable De Novo Genome Assembly", "authors": "Heewoo Kim, Sanjay Sri Vallabh Singapuram, Haojie Ye, Joseph Izraelevitz, Trevor Mudge, Ronald Dreslinski, Nishil Talati", "abstract": "De novo assembly enables investigations of unknown genomes, paving the way for personalized medicine and disease management.However, it faces immense computational challenges arising from the excessive data volumes and algorithmic complexity.While state-of-the-art de novo assemblers utilize distributed systems for extreme-scale genome assembly, they demand substantial computational and memory resources.They also fail to address the inherent challenges of de novo assembly, including a large memory footprint, memory-bound behavior, and irregular data patterns stemming from complex, interdependent data structures.Given these challenges, de novo assembly merits a custom hardware solution, though existing approaches have not fully addressed the limitations.We propose NMP-PaK, a hardware-software co-designed system that accelerates scalable de novo genome assembly through near-memory processing (NMP).Our channel-level NMP architecture addresses memory bottlenecks while providing sufficient scratchpad space for processing elements.Customized processing elements maximize parallelism while efficiently handling large data structures that are both dynamic and interdependent.Software optimizations include customized batch processing to reduce the memory footprint and hybrid CPU-NMP processing to address hardware underutilization caused by irregular data patterns.NMP-PaK conducts the same genome assembly while incurring a 14 smaller memory footprint compared to the state-of-the-art de novo assembly.Moreover, NMP-PaK delivers 16 and 5.7 performance improvements over the CPU and GPU baselines, respectively, with a 2.4 reduction in memory operations.Consequently, NMP-PaK achieves 8.3 greater throughput than state-of-the-art", "topics": ["Genomics and Phylogenetic Studies", "Chromosomal and Genetic Variations", "DNA and Biological Computing"], "rel": ["memory", "scratchpad"], "score": 2, "link": "https://doi.org/10.1145/3695053.3731056", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731056"}, {"venue": "ISCA", "year": 2025, "title": "LIA: A Single-GPU LLM Inference Acceleration with Cooperative AMX-Enabled CPU-GPU Computation and CXL Offloading", "authors": "Hyungyo Kim, Nachuan Wang, Qirong Xia, Jinghan Huang, Amir Yazdanbakhsh, Nam Sung Kim", "abstract": "The limited memory capacity of single GPUs constrains large language model (LLM) inference, necessitating cost-prohibitive multi-GPU deployments or frequent performance-limiting CPU-GPU transfers over slow PCIe.In this work, we first benchmark recent Intel CPUs with Advanced Matrix Extensions (AMX), including 4th generation (Sapphire Rapids) and 6th generation (Granite Rapids) Xeon Scalable Processors, demonstrating matrix multiplication throughput of 20 TFLOPS and 40 TFLOPS, respectivelycomparable to some recent GPUs.These findings unlock more extensive computation offloading to CPUs, reducing CPU-GPU transfers and alleviating throughput bottlenecks compared to priorgeneration CPUs.Building on these insights, we design LIA, a single-GPU LLM inference acceleration framework leveraging cooperative AMX-enabled CPU-GPU computation and CXL offloading.LIA systematically offloads computation to CPUs, optimizing both latency and throughput.The framework also introduces a memoryoffloading policy that seamlessly integrates affordable CXL memory with DDR memory to enhance performance in throughput-driven tasks.On Saphhire Rapids (Granite Rapids) systems with a single H100 GPU, LIA achieves up to 5.1 (19) lower latency and 3.7 (5.1) higher throughput compared to the latest single-GPU offloading framework.Furthermore, LIA deploying CXL offloading yields an additional 1.5 throughput improvement over LIA using only DDR memory with a 1.8 increase in maximum batch size (9001.6K).", "topics": ["Topic Modeling", "Scientific Computing and Data Management", "Advanced Data Storage Technologies"], "rel": ["cxl", "memory"], "score": 2, "link": "https://doi.org/10.1145/3695053.3731092", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731092"}, {"venue": "ISCA", "year": 2025, "title": "Garibaldi: A Pairwise Instruction-Data Management for Enhancing Shared Last-Level Cache Performance in Server Workloads", "authors": "Jaewon Kwon, Yongju Lee, Jiwan Kim, Enhyeok Jang, Hongju Kal, Won Woo Ro", "abstract": "Modern CPUs suffer from the frontend bottleneck because the instruction footprint of server workloads exceeds the private cache capacity.Prior works have examined the CPU components or private cache to improve the instruction hit rate.The large footprint leads to significant cache misses not only in the core and faster-level cache but also in the last-level cache (LLC).We observe that even with an advanced branch predictor and instruction prefetching techniques, a considerable amount of instruction accesses descend to the LLC.However, state-of-the-art LLC designs with elaborate data management overlook handling the instruction misses that precede corresponding data accesses.Specifically, when an instruction requiring numerous data accesses is missed, the frontend of a CPU should wait for the instruction fetch, regardless of how much data are present in the LLC.To preserve hot instructions in the LLC, we propose Garibaldi, a novel pairwise instruction-data management scheme.Garibaldi tracks the hotness of instruction accesses by coupling it with that of data accesses and adopts management techniques.On the one hand, this scheme includes a selective protection mechanism that prevents the cache evictions of high-cost instruction cachelines.On the other hand, in the case of unprotected instruction line misses, Garibaldi conservatively issues prefetch requests of the paired data lines while handling those misses.In our experiments, we evaluate Garibaldi with 16 server workloads on a 40-core machine.We also implement Garibaldi on top of a modern LLC design, including Mockingjay.Garibaldi improves 13.2% and 6.1% of CPU performance on baseline LLC design and Mockingjay, respectively.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Distributed systems and fault tolerance"], "rel": ["cache", "prefetch"], "score": 2, "link": "https://doi.org/10.1145/3695053.3731029", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731029"}, {"venue": "ISCA", "year": 2025, "title": "ANSMET: Approximate Nearest Neighbor Search with Near-Memory Processing and Hybrid Early Termination", "authors": "Yiwei Li, Yuansheng Jin, Boyu Tian, Huanchen Zhang, Mingyu Gao", "abstract": "Approximate nearest neighbor search (ANNS) is a fundamental operation in modern vector databases to efficiently retrieve nearby vectors to a given query.On general-purpose computing platforms, ANNS is found not only to be highly memory-bound due to the large amount of high-dimensional vectors to access, but also exhibits very low utilization of the fetched data as many memory accesses and computations are wasted on not-so-nearby vectors.To alleviate these two inefficiencies, we propose a hardware-software co-design that integrates near-data processing architectures with a novel hybrid partial-dimension/bit early termination strategy.Distance calculation and comparison in ANNS are offloaded to the near-data processing units at the memory rank level.As a vector is being gradually fetched from memory, we conservatively estimate a lower bound of its distance to the query using the partially fetched data, e.g., a subset of dimensions and/or partial bits of each element.If this lower bound already exceeds a threshold, we could early terminate to avoid future unnecessary data accesses and computations.In the presence of such irregular early termination execution flow, we further optimize the data layouts within a single memory access and across multiple memory ranks in the system, and handle efficient coordination between the near-data units and the host processor that executes the rest of index traversal and result sorting.With all the above optimizations, our design demonstrates an average 5.26 speedup of using near-data processing, and another 1.52 from enabling hybrid early termination on top of it.", "topics": ["Advanced Image and Video Retrieval Techniques", "Image Retrieval and Classification Techniques", "Data Management and Algorithms"], "rel": ["memory", "near-data"], "score": 2, "link": "https://doi.org/10.1145/3695053.3731013", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731013"}, {"venue": "ISCA", "year": 2025, "title": "XHarvest: Rethinking High-Performance and Cost-Efficient SSD Architecture with CXL-Driven Harvesting", "authors": "Peng Li, Wenbo Wu, Shushu Yi, Xianzhang Chen, Chenxi Wang, Shengwen Liang, Zhe Wang, Nong Xiao", "abstract": "", "topics": ["Advanced Data Storage Technologies", "Caching and Content Delivery", "Parallel Computing and Optimization Techniques"], "rel": ["cxl", "ssd"], "score": 2, "link": "https://doi.org/10.1145/3695053.3731028", "oa": ""}, {"venue": "MICRO", "year": 2025, "title": "Learning to Walk: Architecting Learned Virtual Memory Translation", "authors": "Kaiyang Zhao, Yuang Chen, Xenia Xu, Dan Schatzberg, Nastaran Hajinazar, Rupin Vakharwala, Andy Anderson, Dimitrios Skarlatos", "abstract": "", "topics": ["Parallel Computing and Optimization Techniques", "Embedded Systems Design Techniques", "Advanced Data Storage Technologies"], "rel": ["memory", "virtual memory"], "score": 2, "link": "https://doi.org/10.1145/3725843.3756093", "oa": "https://doi.org/10.1145/3725843.3756093"}, {"venue": "MICRO", "year": 2025, "title": "RICH Prefetcher: Storing Rich Information in Memory to Trade Capacity and Bandwidth for Latency Hiding", "authors": "Ningzhi Ai, Wenjian He, Hu He, Jing Xia, Heng Liao, Guowei Zhang", "abstract": "", "topics": ["Advanced Data Storage Technologies", "Algorithms and Data Compression", "Parallel Computing and Optimization Techniques"], "rel": ["memory", "prefetch"], "score": 2, "link": "https://doi.org/10.1145/3725843.3756081", "oa": ""}, {"venue": "MICRO", "year": 2025, "title": "Micro-MAMA: Multi-Agent Reinforcement Learning for Multicore Prefetching", "authors": "Charles Block, Gerasimos Gerogiannis, Josep Torrellas", "abstract": "Online reinforcement learning (RL) holds promise for microarchitectural techniques like prefetching.Its ability to adapt to changing and previously-unseen scenarios makes it a versatile technique.However, when multiple RL-operated components compete for shared resources in multicore systems, they can often converge to sub-optimal policies due to conflicting incentives.In this work, we identify key challenges that arise when scaling RL-based prefetchers to multi-core environments, and relate these to known problems from Multi-Agent Reinforcement Learning (MARL).In particular, we find that recent work using multi-armed bandit algorithms for prefetching can lead to inefficient systems when memory bandwidth is limited, as each agent attempts to claim a disproportionate share of the system's bandwidth.To solve this problem, we present Mama, a light-weight supervisor of distributed multi-armed bandit agents, which learns performant joint-policies.In Mama, distributed local agents narrow the global joint-action search space, while a central agent with a global perspective learns system-wide policies.Additionally, Mama provides key local agents with a system perspective, encouraging them to avoid actions that would harm the others.Mama exhibits high adaptability, which we show by evaluating it using multiple measures of performance.In our evaluation of an 8-core system, the policies learned by Mama outperform those of independently-operating agents by an average of 2.1% when optimizing for throughput, and by an average of 10.4% when optimizing for fairness.We also show that Mama performs better in systems that are more bandwidth constrained, as well as when profiles of the workloads are provided.", "topics": ["Advanced Data Storage Technologies", "Parallel Computing and Optimization Techniques", "Distributed and Parallel Computing Systems"], "rel": ["memory", "prefetch"], "score": 2, "link": "https://doi.org/10.1145/3725843.3756096", "oa": "https://dl.acm.org/doi/pdf/10.1145/3725843.3756096"}, {"venue": "MICRO", "year": 2025, "title": "DRAM Fault Classification through Large-Scale Field Monitoring for Robust Memory RAS Management", "authors": "Hoiju Chung, Euisang Oh, Seungmin Baek, Hyeongshin Yoon, Jaesung Yoo, Sanghwan Lee, Yongjun Lee, Arhatha Bramhanand", "abstract": "", "topics": ["VLSI and Analog Circuit Testing", "Radiation Effects in Electronics", "Integrated Circuits and Semiconductor Failure Analysis"], "rel": ["dram", "memory"], "score": 2, "link": "https://doi.org/10.1145/3725843.3756089", "oa": ""}, {"venue": "MICRO", "year": 2025, "title": "COSMOS: RL-Enhanced Locality-Aware Counter Cache Optimization for Secure Memory", "authors": "Haoran Geng, Xiaoyang Lu, Yuezhi Che, Z F Tian, Dazhao Cheng, Xian‐He Sun, Michael Niemier, Xiaobo Sharon Hu", "abstract": "", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Network Packet Processing and Optimization"], "rel": ["cache", "memory"], "score": 2, "link": "https://doi.org/10.1145/3725843.3756047", "oa": "https://doi.org/10.1145/3725843.3756047"}, {"venue": "MICRO", "year": 2025, "title": "Drishti: Do Not Forget Slicing While Designing Last-Level Cache Replacement Policies for Many-Core Systems", "authors": "Sweta, Prerna Priyadarshini, Biswabandan Panda", "abstract": "High-performance Last-level Cache (LLC) replacement policies mitigate off-chip memory access latency by intelligently determining which cache lines to retain in the LLC.State-of-the-art replacement policies significantly outperform policies like LRU.However, the effectiveness of these policies is not evaluated on many-core systems with sliced LLCs, which is common in commercial many-core systems.Recent state-of-the-art LLC replacement policies use two seminal ideas: (i) a sampled cache and (ii) a reuse predictor.In a monolithic LLC, there is a single sampled cache and a single reuse predictor.However, these structures must be created per slice with the sliced LLC.We study the interaction between sliced LLC and state-of-the-art replacement policies, identifying a few unexplored interactions.A per-slice reuse predictor makes myopic decisions based on the accesses made to a particular slice, unaware of the global reuse behavior.A trivial solution to this problem is to design a centralized reuse predictor shared by all the LLC slices.However, this will significantly increase interconnect traffic, requiring more bandwidth to access the centralized reuse predictor.Next, we observe that with a sliced LLC, the LLC sets used for the sampled cache do not receive sufficient LLC misses.As these LLC sets drive the decisions of LLC replacement policies, some of the decisions become suboptimal.We propose Drishti, which is designed to improve the effectiveness of LLC replacement policies further.We make a case for two enhancements: (i) a per-core and yet global reuse predictor with a local (per-slice) sampled cache, and argue that there is no need for a global sampled cache, and (ii) a per-slice dynamic sampled cache to improve the utility of LLC sets used for the sampled cache.We evaluate two state-of-the-art LLC replacement policies, Hawkeye and Mockingjay, on four, 16, and 32-core systems with eight, 32, and 64MB sliced LLC.On a 32-core system, Drishti enhances the effectiveness of two state-of-the-art replacement policies, Hawkeye and Mockingjay, by improving performance by 5.6% and 13.2%, respectively, compared to the baseline LRU policy.Without Drishti, Hawkeye and Mockingjay improve performance by 3.3% and 6.7%, respectively.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Distributed systems and fault tolerance"], "rel": ["cache", "memory"], "score": 2, "link": "https://doi.org/10.1145/3725843.3756028", "oa": "https://dl.acm.org/doi/pdf/10.1145/3725843.3756028"}, {"venue": "ASPLOS", "year": 2025, "title": "AnyKey: A Key-Value SSD for All Workload Types", "authors": "Chanyoung Park, Jungho Lee, Chunyi Liu, Kyungtae Kang, Mahmut Kandemir, Wonil Choi", "abstract": "Key-value solid-state drives (KV-SSDs) are considered as a potential storage solution for large-scale key-value (KV) store applications. Unfortunately, the existing KV-SSD designs are tuned for a specific type of workload, namely, those in which the size of the values are much larger than the size of the keys. Interestingly, there also exists another type of workload, in practice, in which the sizes of keys are relatively large. We re-evaluate the current KV-SSD designs using such unexplored workloads and document their significantly-degraded performance. Observing that the performance problem stems from the increased size of the metadata, we subsequently propose a novel KV-SSD design, called AnyKey, which prevents the size of the metadata from increasing under varying sizes of keys. Our detailed evaluation using a wide range of real-life workloads indicates that AnyKey outperforms the state-of-the-art KV-SSD design under different types of workloads with varying sizes of keys and values.", "topics": ["Advanced Data Storage Technologies", "Caching and Content Delivery", "Distributed and Parallel Computing Systems"], "rel": ["ssd"], "score": 1, "link": "https://doi.org/10.1145/3669940.3707279", "oa": ""}, {"venue": "ASPLOS", "year": 2025, "title": "Velosiraptor: Code Synthesis for Memory Translation", "authors": "Reto Achermann, Eric Chu, Ryan Mehri, Ilias Karimalis, Margo Seltzer", "abstract": "Security is among the top concerns of operating system (OS) developers. A secure runtime environment relies on the OS to correctly configure the memory hardware on which it runs. This is mission-critical as it provides essential security-relevant features and abstractions that ensure the integrity and isolation of untrusted applications running alongside each other. Configuring a platform's memory hardware is not a one-off effort as designers constantly develop new mechanisms for translation and protection with different features and means of configuration. Adapting the OS code to the new hardware is not only a manual, repetitive and time-consuming task, it may also introduce subtle, but security-critical bugs that break security and isolation guarantees.", "topics": ["Security and Verification in Computing", "Advanced Memory and Neural Computing", "Advanced Malware Detection Techniques"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1145/3676641.3711998", "oa": "https://doi.org/10.1145/3676641.3711998"}, {"venue": "ASPLOS", "year": 2025, "title": "Snowplow: Effective Kernel Fuzzing with a Learned White-box Test Mutator", "authors": "Sishuai Gong, Wang Rui, Deniz Altınbüken, Pedro Fonseca, Petros Maniatis", "abstract": "Kernel fuzzers rely heavily on program mutation to automatically generate new test programs based on existing ones. In particular, program mutation can alter the test's control and data flow inside the kernel by inserting new system calls, changing the values of call arguments, or performing other program mutations. However, due to the complexity of the kernel code and its user-space interface, finding the effective mutation that can lead to the desired outcome such as increasing the coverage and reaching a target code location is extremely difficult, even with the widespread use of manually-crafted heuristics.", "topics": ["Software Testing and Debugging Techniques", "Machine Learning and Algorithms", "Advanced Malware Detection Techniques"], "rel": ["kernel"], "score": 1, "link": "https://doi.org/10.1145/3676641.3716019", "oa": "https://doi.org/10.1145/3676641.3716019"}, {"venue": "ASPLOS", "year": 2025, "title": "Simplifying and Accelerating NOR Flash I/O Stack for RAM-Restricted Microcontrollers", "authors": "Hao Huang, Yanqi Pan, Wen Xia, Xiangyu Zou, Darong Yang, Liang Shi, Hongwei Du", "abstract": "NOR flash has been increasingly popular for RAM-restricted microcontrollers due to its small package, high reliability, etc. To satisfy RAM restrictions, existing NOR flash file systems migrate their functionalities, i.e., block-level data organization and wear leveling (WL), from RAM to NOR flash. However, such fine-grained block-level management introduces frequent index updates and NOR flash scanning, leading to severe I/O amplification, which further deteriorates as they are decoupled in existing NOR flash file systems.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "CCD and CMOS Imaging Sensors"], "rel": ["flash"], "score": 1, "link": "https://doi.org/10.1145/3676641.3716272", "oa": ""}, {"venue": "ASPLOS", "year": 2025, "title": "Aqua: Network-Accelerated Memory Offloading for LLMs in Scale-Up GPU Domains", "authors": "Abhishek Vijaya Kumar, Gianni Antichi, Rachee Singh", "abstract": "Inference on large-language models (LLMs) is constrained by GPU memory capacity. A sudden increase in the number of inference requests to a cloud-hosted LLM can deplete GPU memory, leading to contention between multiple prompts for limited resources. Modern LLM serving engines deal with the challenge of limited GPU memory using admission control, which causes them to be unresponsive during request bursts. We propose that preemptive scheduling of prompts in time slices is essential for ensuring responsive LLM inference, especially under conditions of high load and limited GPU memory. However, preempting prompt inference incurs a high paging overhead, which reduces inference throughput. We present Aqua, a GPU memory management framework that significantly reduces the overhead of paging inference state; achieving both responsive and high throughput inference even under bursty request patterns. We evaluate Aqua by hosting several state-of-the-art large generative ML models of different modalities on servers with 8 Nvidia H100 80G GPUs. Aqua improves the responsiveness of LLM inference by 20X compared to the state-of-the-art. It improves LLM inference throughput over a single long prompt by 4X.", "topics": ["Advanced Data Storage Technologies", "Parallel Computing and Optimization Techniques", "Cloud Computing and Resource Management"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1145/3676641.3715983", "oa": "https://doi.org/10.1145/3676641.3715983"}, {"venue": "ASPLOS", "year": 2025, "title": "MDPeek: Breaking Balanced Branches in SGX with Memory Disambiguation Unit Side Channels", "authors": "Chang Liu, Shuaihu Feng, Yuan Li, Dongsheng Wang, Wenjian He, Yongqiang Lyu, Trevor E. Carlson", "abstract": "In recent years, control flow attacks targeting Intel SGX have attracted significant attention from the security community due to their potent capacity for information leakage. Although numerous software-based defenses have been developed to counter these attacks, many remain inadequate in fully addressing other, yet-to-be-discovered side channels.", "topics": ["Security and Verification in Computing", "Parallel Computing and
