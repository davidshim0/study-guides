<script id="data" type="application/json">[{"venue": "MICRO", "year": 2025, "title": "Efficient Security Support for CXL Memory through Adaptive Incremental Offloaded (Re-)Encryption", "authors": "Chuanhan Li, Jishen Zhao, Yuanchao Xu", "abstract": "Current DRAM technologies face critical scaling limitations, significantly impacting the expansion of memory bandwidth and capacity required by modern data-intensive applications.Compute eXpress Link (CXL) emerges as a promising technology to address these limitations, enabling efficient cache-coherent memory expansion through direct connections between processors and CXL memory devices.Despite its potential, broad adoption of CXL memory in public cloud computing introduces substantial security challenges.Trusted Execution Environments (TEEs), such as Intel SGX/TDX and AMD SEV, provide robust protection for data integrity and confidentiality in cloud environments, complemented by CXL Integrity and Data Encryption (CXL IDE), which employs XTS encryption and Galois/Counter Mode (GCM) for secure message transmission.However, this approach incurs significant performance overhead due to the latency of XTS encryption on memory-intensive workloads.To mitigate this, we propose Adaptive Incremental Offloaded (Re-)Encryption (AIORE), an adaptive security framework combining Counter (CTR) and XTS encryption.AIORE dynamically selects encryption schemes based on page access frequency, implements incremental and offloaded re-encryption strategies, and leverages memory node computation to reduce overheads.Evaluation with Gem5 across diverse benchmarks reveals that AIORE significantly reduces security overhead by 62.8% on average and maintains overhead within 3.7% relative to an insecure baseline.", "topics": ["Cryptography and Data Security", "Cryptographic Implementations and Security", "Chaos-based Image/Signal Encryption"], "rel": ["cache", "coheren", "cxl", "dram", "memory", "page"], "score": 6, "link": "https://doi.org/10.1145/3725843.3756119", "oa": "https://dl.acm.org/doi/pdf/10.1145/3725843.3756119"}, {"venue": "ASPLOS", "year": 2025, "title": "ByteFS: System Support for (CXL-based) Memory-Semantic Solid-State Drives", "authors": "Shaobo Li, Yirui Zhou, Hao Ren, Jian Huang", "abstract": "Unlike non-volatile memory that resides on the processor memory bus, memory-semantic solid-state drives (SSDs) support both byte and block access granularity via PCIe or CXL interconnects. They provide scalable memory capacity using NAND flash at a much lower cost. In addition, they have different performance characteristics for their dual byte/block interface respectively, while offering essential memory semantics for upper-level software. Such a byte-accessible storage device provides new implications on the software system design.", "topics": ["Advanced Data Storage Technologies", "Parallel Computing and Optimization Techniques", "Advanced Memory and Neural Computing"], "rel": ["cxl", "flash", "memory", "nand", "ssd"], "score": 5, "link": "https://doi.org/10.1145/3669940.3707250", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "PAISE: PIM-Accelerated Inference Scheduling Engine for Transformer-based LLM", "authors": "Hyojung Lee, Daehyeon Baek, Jimyoung Son, Jieun Choi, Kihyo Moon, Minsung Jang", "abstract": "Transformer-based Large Language Models (LLMs) demand significant computational and memory resources due to the autoregressive token generation in decoder blocks. In particular, the attention layer in LLM models has low arithmetic intensity but high memory traffic, thus requiring frequent updates to the KV matrices with each decoder iteration. As a result, LLM inference becomes memory bound, leading to increased latency. To address this, we introduce PAISE, a framework leveraging Processing-In-Memory (PIM) technology to offload memory-intensive tasks. PAISE employs GPU-PIM heterogeneous computing resources to optimize inference operations in transformer-based LLMs. The framework comprises (i) a scheduling algorithm that decides which operations to offload to PIM based on model configuration and PIM hardware specifications and (ii) an enhanced PIM kernel that performs transaction-wise interleave-batched GEMM (General Matrix Multiplication) operations, maximizing data throughput via data layout adjustments. We implemented PAISE on the GPT-2 and Llama2-7B models using an AMD MI100 GPU with HBM-PIM devices. Our evaluations show that offloading the attention layer to PIM reduces execution time by up to 48.3% compared to GPU-only inference, demonstrating PAISE’s significant potential to enhance the efficiency of LLM inference, which could lead to faster and more efficient AI applications.", "topics": ["Power Systems Fault Detection", "Power Transformer Diagnostics and Insulation", "Magnetic Properties and Applications"], "rel": ["hbm", "in-memory", "kernel", "memory", "pim"], "score": 5, "link": "https://doi.org/10.1109/hpca61900.2025.00126", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "FACIL: Flexible DRAM Address Mapping for SoC-PIM Cooperative On-device LLM Inference", "authors": "Seong Hoon Seo, Jung-Hoon Kim, Donghyun Lee, Seonah Yoo, Seokwon Moon, Yeonhong Park, Jae Wook Lee", "abstract": "The rise of on-device inference of large language models (LLMs) is rapidly escalating the demand for memory-intensive operations on edge devices. While DRAMbased processing-in-memory (PIM) is a promising solution for overcoming the memory wall, edge devices require PIM to function both as a compute unit and a memory device due to their limited memory capacity. Such PIM-enabled memory complicates the partition and placement of a tensor into DRAM banks in a PIM-operable manner. Notably, we highlight that LLM weights need to be accessible by both PIM and system-on-chip (SoC) processors, as the same weights are used for both SoC-favorable GEMM and PIM-favorable GEMV operations. This necessitates different memory mappings for PIM and SoC processors, leading to potential re-layout costs when switching between the two. To address this challenge, we propose FACIL, a flexible DRAM address mapping solution that efficiently places tensors in DRAM for PIM operations while allowing SoC processors to access the same data using contiguous virtual addresses. FACIL consists of (i) a memory controller that assigns different DRAM address mapping to the page offset bits of each huge page and (ii) a user-level library that determines the appropriate DRAM address mapping. We demonstrate that enabling re-layout-free access of both PIM and SoC processor benefits LLM inference on various on-device LLM tasks, including short conversation and code autocompletion, reducing the time-to-first-token by $2.37 \\times$ and $2.63 \\times$, respectively, over the SoC-PIM baseline.", "topics": ["Semiconductor materials and devices", "Advancements in Semiconductor Devices and Circuit Design", "Integrated Circuits and Semiconductor Failure Analysis"], "rel": ["dram", "in-memory", "memory", "page", "pim"], "score": 5, "link": "https://doi.org/10.1109/hpca61900.2025.00127", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "PIMnet: A Domain-Specific Network for Efficient Collective Communication in Scalable PIM", "authors": "Hyojun Son, Gilbert Jonatan, Xiangyu Wu, Haeyoon Cho, Kaustubh Shivdikar, José Luis Abellán, Ajay Joshi, David Kaeli", "abstract": "Processing-in-memory (PIM), where compute is moved closer to memory or data, has been explored to accelerate emerging workloads. Different PIM-based systems have been announced, each offering a unique microarchitectural organization of their compute units, ranging from fixed functional units to programmable general-purpose compute cores near memory. However, one fundamental limitation of PIM is that each compute unit can only access its local memory; access to “remote” memory must occur through the host CPU - potentially limiting application performance scalability. In this work, we first characterize the scalability of real PIM architectures using the UPMEM PIM system. We analyze how the overhead of communicating through the host (instead of providing direct communication between the PIM compute units) can become a bottleneck for collective communications that are commonly used in many workloads. To overcome this inter-PIM bank communication, we propose PIMnet - a PIM interconnection network for PIM banks that provides direct connectivity between compute units and removes the overhead of communicating through the host. PIMnet exploits bandwidth parallelism where communication across the different PIM bank/chips can occur in parallel to maximize communication performance. PIMnet also matches the DRAM packaging hierarchy with a multi-tier network architecture. Unlike traditional interconnection networks, PIMnet is a PIMcontrolled network where communication is managed by the PIM logic, optimizing collective communications and minimizing the hardware overhead of PIMnet. Our evaluation of PIMnet shows that it provides up to $85 \\times$ speedup on collective communications and achieves a $11.8 \\times$ improvement on real applications compared to the baseline PIM.", "topics": ["Cellular Automata and Applications", "Quantum-Dot Cellular Automata", "Modular Robots and Swarm Intelligence"], "rel": ["dram", "in-memory", "memory", "pim", "tier"], "score": 5, "link": "https://doi.org/10.1109/hpca61900.2025.00116", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Lincoln: Real-Time 50~100B LLM Inference on Consumer Devices with LPDDR-Interfaced, Compute-Enabled Flash Memory", "authors": "Weiyi Sun, Mingyu Gao, Zhaoshi Li, Aoyang Zhang, Iris Ying Chou, Jianfeng Zhu, Shaojun Wei, Leibo Liu", "abstract": "With the widespread use of large language models (LLMs), and with the privacy and cost concerns on cloud-based services, vendors are now pushing LLM inference to consumer devices. However, current attempts only enable real-time inference of low-quality small-sized LLMs. Large-sized LLMs have to load most of their weights from Flash storage for every execution iteration, which dominates the execution time of both the prefill and the generation phase. This performance bottleneck is attributed to both the low internal Flash memory bandwidth and the low transmission bandwidth between Flash and the Neural Processing Unit (NPU). To tackle these two challenges, we present Lincoln, a device-architecture co-design solution with LPDDR-interfaced, Compute-Enabled Flash Memory. On the device level, we boost the Flash internal bandwidth by improving upon existing array shrinking methods, to enable lower read latency and more parallel Flash planes within each Flash die. We specifically leverage 3D hybrid bonding, which is already adopted in consumer Flash products, to maintain high area efficiency and low density loss. On the architecture level, to leverage such increased internal bandwidth for resolving the transmission bottleneck, we propose two solutions for the two distinct phases of LLMs. For the compute-intensive prefill phase, we let Flash devices use the existing high-speed LPDDR interface (originally for DRAM), which offers much higher transmission bandwidth to the NPU than the conventional Flash interface, while maintaining good cost and area efficiency. For the memory-intensive generation phase, we rely on hybrid-bonding-based near-Flash computing to fully utilize the internal Flash bandwidth, and further equip with speculative decoding to eventually reach the real-time latency goal. Our evaluation shows that Lincoln enables real-time inference, with up to $13.23 \\times$ and $254.1 \\times$ speedups for LLM prefill and generation phases over conventional SSD-based systems.", "topics": ["Advanced Data Storage Technologies"], "rel": ["dram", "flash", "hybrid-bond", "memory", "ssd"], "score": 5, "link": "https://doi.org/10.1109/hpca61900.2025.00128", "oa": ""}, {"venue": "ISCA", "year": 2025, "title": "AiF: Accelerating On-Device LLM Inference Using In-Flash Processing", "authors": "Jaeyong Lee, Hyeunjoo Kim, Sanghun Oh, Myoungjun Chun, Myungsuk Kim, Jihong Kim", "abstract": "While large language models (LLMs) achieve remarkable performance across diverse application domains, their substantial memory demands present challenges, especially on personal devices with limited DRAM capacity.Recent LLM inference engines have introduced SSD offloading for model parameters to reduce memory footprint.However, the highly memory-bound nature of on-device LLMs makes inference speed heavily dependent on read bandwidth, leading to significant performance degradation due to the limited bandwidth of SSDs.In this paper, we propose an in-flash processing solution for on-device LLM, called Accelerator-in-Flash (AiF), which integrates matrix-vector multiplication (GEMV) operations directly into flash chips.By enabling in-flash GEMV operations, AiF leverages the high internal bandwidth of flash chips without being constrained by the limited external bandwidth.Building on this core structure, AiF employs two novel flash read techniques that were specifically optimized for reading LLM parameters stored in flash memory.AiF achieves a 4x boost in internal read bandwidth during inference with minimal implementation overhead, thanks to its streamlined error correction process.Evaluations on eight real-world LLMs reveal that AiF provides a 14.6x throughput improvement compared to baseline SSD offloading schemes.Furthermore, AiF surpasses in-memory inference, delivering 1.4x higher throughput with a significantly reduced memory footprint.", "topics": ["Advanced Data Storage Technologies", "Scientific Computing and Data Management", "Privacy-Preserving Technologies in Data"], "rel": ["dram", "flash", "in-memory", "memory", "ssd"], "score": 5, "link": "https://doi.org/10.1145/3695053.3731073", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731073"}, {"venue": "MICRO", "year": 2025, "title": "Stratum: System-Hardware Co-Design with Tiered Monolithic 3D-Stackable DRAM for Efficient MoE Serving", "authors": "Yue Pan, Zihan Xia, Po-Kai Hsu, Lanxiang Hu, Hyungyo Kim, Janak Sharda, Minxuan Zhou, Nam Sung Kim", "abstract": "As Large Language Models (LLMs) continue to evolve, Mixture of Experts (MoE) architecture has emerged as a prevailing design for achieving state-of-the-art performance across a wide range of tasks. MoE models use sparse gating to activate only a handful of expert sub-networks per input, achieving billion-parameter capacity with inference costs akin to much smaller models. However, such models often pose challenges for hardware deployment due to the massive data volume introduced by the MoE layers. To address the challenges of serving MoE models, we propose Stratum, a system-hardware co-design approach that combines the novel memory technology Monolithic 3D-Stackable DRAM (Mono3D DRAM), near-memory processing (NMP), and GPU acceleration. The logic and Mono3D DRAM dies are connected through hybrid bonding, whereas the Mono3D DRAM stack and GPU are interconnected via silicon interposer. Mono3D DRAM offers higher internal bandwidth than HBM thanks to the dense vertical interconnect pitch enabled by its monolithic structure, which supports implementations of higher-performance near-memory processing. Furthermore, we tackle the latency differences introduced by aggressive vertical scaling of Mono3D DRAM along the z-dimension by constructing internal memory tiers and assigning data across layers based on access likelihood, guided by topic-based expert usage prediction to boost NMP throughput. The Stratum system achieves up to 8.29x improvement in decoding throughput and 7.66x better energy efficiency across various benchmarks compared to GPU baselines.", "topics": ["Advanced Memory and Neural Computing", "Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies"], "rel": ["3d-stack", "dram", "hbm", "memory", "tier"], "score": 5, "link": "https://doi.org/10.1145/3725843.3756043", "oa": "https://arxiv.org/pdf/2510.05245"}, {"venue": "MICRO", "year": 2025, "title": "Beyond Page Migration: Enhancing Tiered Memory Performance via Integrated Last-Level Cache Management and Page Migration", "authors": "Hwanjun Lee, Minho Kim, Yeji Jung, Seonmu Oh, Ki-Dong Kang, Seunghak Lee, Daehoon Kim", "abstract": "", "topics": ["Hearing Impairment and Communication", "Linguistics and Education Research", "Subtitles and Audiovisual Media"], "rel": ["cache", "memory", "migration", "page", "tier"], "score": 5, "link": "https://doi.org/10.1145/3725843.3756063", "oa": "https://doi.org/10.1145/3725843.3756063"}, {"venue": "ASPLOS", "year": 2025, "title": "PIM Is All You Need: A CXL-Enabled GPU-Free System for Large Language Model Inference", "authors": "Yufeng Gu, Alireza Khadem, Sumanth Umesh, Ning Liang, Xavier Servot, Onur Mutlu, Ravishankar Iyer, Reetuparna Das", "abstract": "Large Language Model (LLM) inference uses an autoregressive manner to generate one token at a time, which exhibits notably lower operational intensity compared to earlier Machine Learning (ML) models such as encoder-only transformers and Convolutional Neural Networks. At the same time, LLMs possess large parameter sizes and use key-value caches to store context information. Modern LLMs support context windows with up to 1 million tokens to generate versatile text, audio, and video content. A large key-value cache unique to each prompt requires a large memory capacity, limiting the inference batch size. Both low operational intensity and limited batch size necessitate a high memory bandwidth. However, contemporary hardware systems for ML model deployment, such as GPUs and TPUs, are primarily optimized for compute throughput. This mismatch challenges the efficient deployment of advanced LLMs and makes users to pay for expensive compute resources that are poorly utilized for the memory-bound LLM inference tasks.", "topics": ["Topic Modeling", "Natural Language Processing Techniques", "Ferroelectric and Negative Capacitance Devices"], "rel": ["cache", "cxl", "memory", "pim"], "score": 4, "link": "https://doi.org/10.1145/3676641.3716267", "oa": "https://arxiv.org/pdf/2502.07578"}, {"venue": "ASPLOS", "year": 2025, "title": "PAPI: Exploiting Dynamic Parallelism in Large Language Model Decoding with a Processing-In-Memory-Enabled Computing System", "authors": "Yintao He, Haiyu Mao, Christina Giannoula, Mohammad Sadrosadati, Juan Gómez-Luna, Huawei Li, Xiaowei Li, Ying Wang", "abstract": "Large language models (LLMs) are widely used for natural language understanding and text generation. An LLM model relies on a time-consuming step called LLM decoding to generate output tokens. Several prior works focus on improving the performance of LLM decoding using parallelism techniques, such as batching and speculative decoding. State-of-the-art LLM decoding has both compute-bound and memory-bound kernels. Some prior works statically identify and map these different kernels to a heterogeneous architecture consisting of both processing-in-memory (PIM) units and computation-centric accelerators (e.g., GPUs). We observe that characteristics of LLM decoding kernels (e.g., whether or not a kernel is memory-bound) can change dynamically due to parameter changes to meet user and/or system demands, making (1) static kernel mapping to PIM units and computation-centric accelerators suboptimal, and (2) one-size-fits-all approach of designing PIM units inefficient due to a large degree of heterogeneity even in memory-bound kernels.", "topics": ["Parallel Computing and Optimization Techniques", "Network Packet Processing and Optimization", "Neural Networks and Applications"], "rel": ["in-memory", "kernel", "memory", "pim"], "score": 4, "link": "https://doi.org/10.1145/3676641.3716009", "oa": "https://doi.org/10.1145/3676641.3716009"}, {"venue": "ASPLOS", "year": 2025, "title": "ShadowLoad: Injecting State into Hardware Prefetchers", "authors": "Lorenz Hetterich, Fabian Thomas, L. O. Gerlach, Ruiyi Zhang, Nils Bernsdorf, Eduard Ebert, Michael Schwarz", "abstract": "Hardware prefetchers are an optimization in modern CPUs that predict memory accesses and preemptively load the corresponding value into the cache. Previous work showed that the internal state of hardware prefetchers can act as a side channel, leaking information across security boundaries such as processes, user and kernel space, and even trusted execution environments.", "topics": ["Security and Verification in Computing", "Parallel Computing and Optimization Techniques", "Advanced Malware Detection Techniques"], "rel": ["cache", "kernel", "memory", "prefetch"], "score": 4, "link": "https://doi.org/10.1145/3676641.3716020", "oa": ""}, {"venue": "ASPLOS", "year": 2025, "title": "Wave: Offloading Resource Management to SmartNIC Cores", "authors": "Jack Tigar Humphries, Neel Natu, Kostis Kaffes, Stanko Novaković, Paul S. Turner, Henry M. Levy, David Culler, Christos Kozyrakis", "abstract": "SmartNICs are increasingly deployed in datacenters to offload tasks from server CPUs, improving the efficiency and flexibility of datacenter security, networking and storage. Optimizing cloud server efficiency in this way is critically important to ensure that virtually all server resources are available to paying customers. Userspace system software, specifically, decision-making tasks performed by various operating system subsystems, is particularly well suited for execution on mid-tier SmartNIC ARM cores. To this end, we introduce Wave, a framework for offloading userspace system software to processes/agents running on the SmartNIC. Wave uses Linux userspace systems to better align system functionality with SmartNIC capabilities. It also introduces a new host-SmartNIC communication API that enables offloading of even μs-scale system software. To evaluate Wave, we offloaded preexisting userspace system software including kernel thread scheduling, memory management, and an RPC stack to SmartNIC ARM cores, which showed a performance degradation of 1.1%-7.4% in an apples-to-apples comparison with on-host implementations. Wave recovered host resources consumed by on-host system software for memory management (saving 16 host cores), RPCs (saving 8 host cores), and virtual machines (an 11.2% performance improvement). Wave highlights the potential for rethinking system software placement in modern datacenters, unlocking new opportunities for efficiency and scalability.", "topics": ["Cloud Computing and Resource Management", "Security and Verification in Computing", "Software-Defined Networks and 5G"], "rel": ["kernel", "memory", "smartnic", "tier"], "score": 4, "link": "https://doi.org/10.1145/3676642.3736113", "oa": "https://dl.acm.org/doi/pdf/10.1145/3676642.3736113"}, {"venue": "HPCA", "year": 2025, "title": "Anaheim: Architecture and Algorithms for Processing Fully Homomorphic Encryption in Memory", "authors": "Jongmin Kim, Sungmin Yun, Hyesung Ji, Wonseok Choi, Sangpyo Kim, Jung Ho Ahn", "abstract": "Fully homomorphic encryption (FHE) is a promising solution for privacy-preserving cloud computing as it enables computations on sensitive data without any risk of data leakage. Despite the significant attention FHE has received, substantial computation and memory demands make it hardly practical for real-world applications. We propose a readily available and practical hardware solution to tackle this problem by using GPUs. GPUs have adequate computational and memory resources to handle complex operations in FHE, including number-theoretic transform (NTT), on which most prior work has deeply focused. However, through detailed analyses, we discover that the performance bottleneck on GPUs is primarily due to simpler element-wise operations, which are limited by off-chip memory (DRAM) bandwidth. Motivated by these observations, we develop Anaheim, a processing-in-memory (PIM) architecture for FHE. We develop optimized FHE execution flows and an end-toend software framework for using PIM with GPUs. Also, we design a versatile PIM unit that handles various modular integer arithmetic PIM instructions, along with an efficient data mapping and associated PIM execution algorithms that minimize data access overhead by leveraging the internal structure of DRAM. Our concerted efforts substantially enhance the performance and energy efficiency of various FHE workloads on GPUs.", "topics": ["Cryptography and Data Security", "Coding theory and cryptography", "Cryptography and Residue Arithmetic"], "rel": ["dram", "in-memory", "memory", "pim"], "score": 4, "link": "https://doi.org/10.1109/hpca61900.2025.00089", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Efficient Caching with A Tag-enhanced DRAM", "authors": "Maryam Babaie, Ayaz Akram, Wendy Elsasser, Brent Haukness, Michael R. Miller, Taeksang Song, Thomas Vogelsang, Steven C. Woo", "abstract": "As SRAM-based caches are hitting a scaling wall, manufacturers are integrating DRAM-based caches into system designs to continue increasing cache sizes. While DRAM caches can improve the performance of memory systems, existing DRAM cache designs suffer from high miss penalties, wasted data movement, and interference between misses and demands. In this paper, we propose TDRAM, a novel DRAM microarchitecture tailored for caching. TDRAM enhances existing DRAM, such as HBM3, by adding small, low-latency mats to store tags and metadata on the same die as the data mats. These mats enable tag and data access in lockstep, in-DRAM tag comparison, and conditional data response based on the comparison result (reducing wasted data transfers), akin to SRAM cache mechanisms. TDRAM further optimizes hit and miss latencies through opportunistic early tag probing. Moreover, TDRAM introduces a flush buffer to store conflicting dirty data on write misses, eliminating data bus turnaround delays on write demands. We evaluate TDRAM in a full-system simulation using a set of HPC workloads with large memory footprints, showing that TDRAM, on average, provides $2.65 \\times$ faster tag checks, $1.23 \\times$ speedup, and 21% less energy consumption compared to state-of-the-art commercial and research designs.", "topics": ["Caching and Content Delivery", "Advanced Data Storage Technologies", "DNA and Biological Computing"], "rel": ["cache", "dram", "hbm", "memory"], "score": 4, "link": "https://doi.org/10.1109/hpca61900.2025.00062", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Marching Page Walks: Batching and Concurrent Page Table Walks for Enhancing GPU Throughput", "authors": "Jiwon Lee, Gun Ko, Myung Kuk Yoon, Ipoom Jeong, Yunho Oh, Won Woo Ro", "abstract": "Virtual memory, with the support of address translation hardware, is a key technique in expanding programmability and memory management in GPUs. However, the nature of the GPU execution model heavily pressures its translation hardware, particularly due to a discrepancy in the behavior of page table walkers and thousands of concurrently running threads. In GPU workloads, multiple threads simultaneously access a number of pages necessitating a substantial number of translations whereas each walker handles only a single walk request at a time. Such a limitation significantly increases the queueing latency of walk requests, which we observe as a major bottleneck for servicing page table walks in GPUs. To tackle this challenge, we investigate a design of page walkers that facilitates multiple walk requests to be handled together in batches. Then, we make the following observations: 1) allowing a page walker to issue beyond a single memory request significantly improves the throughput of walkers, and 2) GPU applications tend to concurrently access pages in wide address ranges. By leveraging the above implications, we propose Marching Page Walks (MPW) that effectively mitigate the contention in GPU page table walkers. MPW scans pending walk requests to identify ones that can be grouped together. Then, MPW batches these requests and concurrently handles them by issuing multiple memory instructions. Experiments show that MPW reduces the queueing latency of page walks by 86.7% and improves GPU performance by 55.6% over the baseline design.", "topics": ["Distributed and Parallel Computing Systems", "Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies"], "rel": ["address translation", "memory", "page", "virtual memory"], "score": 4, "link": "https://doi.org/10.1109/hpca61900.2025.00123", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Integrating Prefetcher Selection with Dynamic Request Allocation Improves Prefetching Efficiency", "authors": "Mengming Li, Qijun Zhang, Yongqing Ren, Zhiyao Xie", "abstract": "Hardware prefetching plays a critical role in hiding the off-chip DRAM latency. The complexity of applications results in a wide variety of memory access patterns, prompting the development of numerous cache-prefetching algorithms. Consequently, commercial processors often employ a hybrid of these algorithms to enhance the overall prefetching performance. Nonetheless, since these prefetchers share hardware resources, conflicts arising from competing prefetching requests can negate the benefits of hardware prefetching. Under such circumstances, several prefetcher selection algorithms have been proposed to mitigate conflicts between prefetchers. However, these prior solutions suffer from two limitations. First, the input demand request allocation is inaccurate. Second, the prefetcher selection criteria are coarse-grained. In this paper, we address both limitations by introducing an efficient and widely applicable prefetcher selection algorithm—Alecto <sup xmlns:mml=\"http://www.w3.org/1998/Math/MathML\" xmlns:xlink=\"http://www.w3.org/1999/xlink\">1</sup>, which tailors the demand requests for each prefetcher. Every demand request is first sent to Alecto to identify suitable prefetchers before being routed to prefetchers for training and prefetching. Our analysis shows that Alecto is adept at not only harmonizing prefetching accuracy, coverage, and timeliness but also significantly enhancing the utilization of the prefetcher table, which is vital for temporal prefetching. Alecto outperforms the state-of-the-art RL-based prefetcher selection algorithm—Bandit by $2.76 \\%$ in single-core, and $\\mathbf{7. 5 6 \\%}$ in eight-core. For memory-intensive benchmarks, Alecto outperforms Bandit by $\\mathbf{5. 2 5 \\%}$. Alecto consistently delivers state-of-the-art performance in scheduling various types of cache prefetchers. In addition to the performance improvement, Alecto can reduce the energy consumption associated with accessing the prefetchers’ table by $48 \\%$ ($7 \\%$ energy reduction on the entire memory hierarchy), while only adding less than 1 KB of storage overhead.<sup xmlns:mml=\"http://www.w3.org/1998/Math/MathML\" xmlns:xlink=\"http://www.w3.org/1999/xlink\">1</sup>The name Alecto stands for the combination of selection and allocation.", "topics": ["Optimization and Search Problems", "Distributed and Parallel Computing Systems", "Caching and Content Delivery"], "rel": ["cache", "dram", "memory", "prefetch"], "score": 4, "link": "https://doi.org/10.1109/hpca61900.2025.00026", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Make LLM Inference Affordable to Everyone: Augmenting GPU Memory with NDP-DIMM", "authors": "Lian Liu, Shixin Zhao, Bing Li, Haimeng Ren, Zhichao Xu, Mengdi Wang, Xiaowei Li, Yinhe Han", "abstract": "The billion-scale Large Language Models (LLMs) necessitate deployment on expensive server-grade GPUs with large-storage HBMs and abundant computation capability. As LLM-assisted services become popular, achieving cost-effective LLM inference on budget-friendly hardware becomes the current trend. This has sparked extensive research into relocating LLM parameters from expensive GPUs to external host memory. However, the restricted bandwidth between the host and GPU memory limits the inference performance of existing solutions. This work introduces Hermes, a budget-friendly system that leverages the near-data processing units (NDP) within commodity DRAM DIMMs to enhance the performance of a single consumer-grade GPU, achieving efficient LLM inference. We recognize that the inherent activation sparsity in LLMs naturally divides weight parameters into two categories, termed “hot” and “cold” neurons, respectively. Hot neurons, which consist of only approximately 20% of all weight parameters, account for 80% of the total computational load. In contrast, cold neurons make up the other 80% of parameters but are responsible for just 20% of the computational workload. Leveraging this observation, we propose a heterogeneous computing strategy: mapping hot neurons to a single computation-efficient GPU without large-capacity HBMs, while offloading cold neurons to NDP-DIMMs, which offer large memory size but limited computation capabilities. In addition, the dynamic nature of activation sparsity necessitates a real-time partition of hot and cold neurons and adaptive remapping of cold neurons across multiple NDP-DIMM modules. To tackle these issues, we introduce a lightweight predictor that ensures optimal real-time neuron partition and adjustment between GPU and NDP-DIMMs. Furthermore, we utilize a window-based online scheduling mechanism to maintain load balance among multiple NDP-DIMM modules. In summary, Hermes facilitates the deployment of LLaMA2-70B on consumer-grade hardware at a rate of 13.75 tokens/s and realizes an average 75.24 × speedup over the state-of-the-art offloading-based inference system on popular LLMs.", "topics": ["Advanced Neural Network Applications", "Advanced Data Storage Technologies"], "rel": ["dram", "hbm", "memory", "near-data"], "score": 4, "link": "https://doi.org/10.1109/hpca61900.2025.00129", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Piccolo: Large-Scale Graph Processing with Fine-Grained in-Memory Scatter-Gather", "authors": "Changmin Shin, Jaeyong Song, Hongsun Jang, Dogeun Kim, Jun Ho Sung, Taehee Kwon, Jae Hyung Ju, Frank Liu", "abstract": "Graph processing requires irregular, fine-grained random access patterns incompatible with contemporary off-chip memory architecture, leading to inefficient data access. This inefficiency makes graph processing an extremely memory-bound application. Because of this, existing graph processing accelerators typically employ a graph tiling-based or processing-in-memory (PIM) approach to relieve the memory bottleneck. In the tiling-based approach, a graph is split into chunks that fit within the on-chip cache to maximize data reuse. In the PIM approach, arithmetic units are placed within memory to perform operations such as reduction or atomic addition. However, both approaches have several limitations, especially when implemented on current memory standards (i.e., DDR). Because the access granularity provided by DDR is much larger than that of the graph vertex property data, much of the bandwidth and cache capacity are wasted. PIM is meant to alleviate such issues, but it is difficult to use in conjunction with the tiling-based approach, resulting in a significant disadvantage. Furthermore, placing arithmetic units inside a memory chip is expensive, thereby supporting multiple types of operation is thought to be impractical. To address the above limitations, we present Piccolo, an end-to-end efficient graph processing accelerator with fine-grained in-memory random scatter-gather. Instead of placing expensive arithmetic units in off-chip memory, Piccolo focuses on reducing the off-chip traffic with non-arithmetic function-in-memory of random scatter-gather. To fully benefit from in-memory scatter-gather, Piccolo redesigns the cache and miss-handling architecture (MHA) of the accelerator such that it can enjoy both the advantage of tiling and in-memory operations. Piccolo achieves a maximum speedup of 3.28 × and a geometric mean speedup of 1.62 ×, along with up to 59.7% reduction in energy consumption across various and extensive benchmarks.", "topics": ["Graph Theory and Algorithms"], "rel": ["cache", "in-memory", "memory", "pim"], "score": 4, "link": "https://doi.org/10.1109/hpca61900.2025.00055", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "To Cross, or Not to Cross Pages for Prefetching?", "authors": "Georgios Vavouliotis, Mart́ı Torrents, Boris Grot, Kleovoulos Kalaitzidis, Leeor Peled, Marc Casas", "abstract": "Despite processor vendors reporting that cache prefetchers operating with virtual addresses are permitted to cross page boundaries, academia is focused on optimizing cache prefetching for patterns within page boundaries. This work reveals that page-cross prefetching at the first-level data cache (L1D) is seldom beneficial across different execution phases and workloads while showing that state-of-the-art L1D prefetchers are not very accurate at prefetching across page boundaries. In response, we propose $M O K A$, a holistic framework for designing Page-Cross Filters, i.e., microarchitectural schemes that ensure effective and accurate prefetching across page boundaries. MOKA combines (i) hashed perceptron predictors that use prefetcher-independent program features, (ii) predictors that adapt decisions based on the system state (e.g., TLB pressure), and (iii) a scheme to dynamically optimize predictions across different execution phases and workload types. We use the MOKA framework to prototype a Page-Cross Filter, named DRIPPER, for three relevant L1D prefetchers (Berti [60], IPCP [61], BOP [57]). We show that DRIPPER accurately enables pagecross prefetching only when it is beneficial for performance. For instance, Berti [60] (state-of-the-art prefetcher) combined with DRIPPER improves single-core geomean performance over Berti that always permits page-cross prefetches and Berti that always discards page-cross prefetches by $\\mathbf{1 . 7 \\%}(\\mathbf{1 . 2 \\%})$ and $\\mathbf{2 . 5 \\%}(\\mathbf{2 . 1 \\%})$ across 218 seen (178 unseen) workloads, respectively. Across 300 8 -core mixes, the corresponding geomean speedups are $2.0 \\%$ and $3.3 \\%$. Finally, we show that DRIPPER provides consistent benefits when both 4KB pages and 2MB large pages are used.", "topics": ["Advanced Data Storage Technologies", "Algorithms and Data Compression", "Distributed and Parallel Computing Systems"], "rel": ["cache", "page", "prefetch", "tlb"], "score": 4, "link": "https://doi.org/10.1109/hpca61900.2025.00025", "oa": "https://www.research.ed.ac.uk/en/publications/f227f22b-8dab-40d8-975a-ba010b250eed"}, {"venue": "HPCA", "year": 2025, "title": "OASIS: Object-Aware Page Management for Multi-GPU Systems", "authors": "Yueqi Wang, Bingyao Li, Mohamed Tarek Ibn Ziad, Lieven Eeckhout, Jun Yang, Aamer Jaleel, Xulong Tang", "abstract": "The ever-growing need for high-performance computing has driven the popularity of employing multi-GPU systems. Modern multi-GPU systems employ unified virtual memory (UVM) to manage page placement and migration. However, the page management in UVM is application object agnostic. In this paper, we characterize the page access behaviors in relation to the application objects, and reveal that the beneficial page management policy varies according to (i) the different data objects within the same application, and (ii) the different execution phases of the same object. This motivates the need for dynamic and proactive page management in multi-GPU systems. To this end, we propose OASIS, which dynamically identifies object patterns during the execution and proactively determines the appropriate page management policies for these objects at runtime. Experimental results show that OASIS improves the performance over uniformly adopting on-touch migration, access counter-based migration, and duplication by an average of $\\mathbf{6 4 \\%}$, $\\mathbf{3 5 \\%}$, and $\\mathbf{4 2 \\%}$, respectively. Moreover, OASIS achieves a $\\mathbf{1 2 \\%}$ performance improvement over the state-of-the-art technique (i.e., GRIT) while having significantly lower design complexity.", "topics": ["Distributed and Parallel Computing Systems", "Cloud Computing and Resource Management", "Scientific Computing and Data Management"], "rel": ["memory", "migration", "page", "virtual memory"], "score": 4, "link": "https://doi.org/10.1109/hpca61900.2025.00124", "oa": ""}, {"venue": "ISCA", "year": 2025, "title": "Folded Banks: 3D-Stacked HBM Design for Fine-Grained Random-Access Bandwidth", "authors": "Vignesh Adhinarayanan, Bradford M. Beckmann, Wantong Li, Seyed Mohammad Seyedzadeh, Sergey Blagodurov, Derrick Aguren, H. Lee", "abstract": "Despite significant improvements in peak bandwidth, the HBM industry has neglected random-access (irregular) bandwidth, limiting performance in many real-world applications.Improving effective HBM bandwidth is challenging due to power-constrained activations and coarse-grained, long-distance data movement.Rather than addressing these issues directly, hardware vendors have opted for incremental changes, achieving a 6.4 increase in sequential access bandwidth over two generations while leaving the irregular bandwidth challenges unresolved.To remedy this, we introduce Folded Banks (FB-HBM), a novel 3D bank design that redistributes bank subarrays (\"folds\") across multiple dies and relocates command, control, and global sense amplifiers to an additional base layer.By implementing this logic in a new base layer, we eliminate the DRAM die overheads inherent in previous designs.This architecture enables vertical routing of intra-bank wires-column select lines (CSLs) and master data lines (MDLs)-through thin-pitch through-silicon vias (TSVs) and hybrid bonds, significantly reducing RC power losses.By employing self-timed sense amplifiers, we eliminate costly dummy subarrays * Work done while Wantong", "topics": ["3D IC and TSV technologies", "Interconnection Networks and Systems", "Modular Robots and Swarm Intelligence"], "rel": ["3d-stack", "dram", "hbm", "stacked"], "score": 4, "link": "https://doi.org/10.1145/3695053.3731111", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731111"}, {"venue": "ISCA", "year": 2025, "title": "Heliostat: Harnessing Ray Tracing Accelerators for Page Table Walks", "authors": "Yuan Feng, Yuke Li, Jiwon Lee, Won Woo Ro, Hyeran Jeon", "abstract": "This paper introduces Heliostat, which enhances page translation bandwidth on GPUs by harnessing underutilized ray tracing accelerators (RTAs).While most existing studies focused on better utilizing the provided translation bandwidth, this paper introduces a new opportunity to fundamentally increase the translation bandwidth.Instead of overprovisioning the GPU memory management unit (GMMU), Heliostat repurposes the existing RTAs by leveraging the operational similarities between ray tracing and page table walks.Unlike earlier studies that utilized RTAs for certain workloads, Heliostat democratizes RTA for supporting any workloads by improving virtual memory performance.Heliostat+ optimizes Heliostat by handling predicted future address translations proactively.Heliostat outperforms baseline and two state-of-the-arts by 1.93, 1.92, and 1.66.Heliostat+ further speeds up Heliostat by 1.23.Compared to an overprovisioned comparable solution, Heliostat occupies only 1.53% of the area and consumes 5.8% of the power.", "topics": ["Computer Graphics and Visualization Techniques", "Advanced Data Storage Technologies", "Video Analysis and Summarization"], "rel": ["address translation", "memory", "page", "virtual memory"], "score": 4, "link": "https://doi.org/10.1145/3695053.3731011", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731011"}, {"venue": "ISCA", "year": 2025, "title": "Magellan: A High-Performance Loop-Guided Prefetcher for Indirect Memory Access", "authors": "Gelin Fu, Tian Xia, Mingzhuo Yin, Prashant J. Nair, Mieszko Lis, Pengju Ren", "abstract": "Graph analytics and sparse linear algebra applications heavily rely on indirect memory access (IMA).IMAs are characterized by poor temporal and spatial locality, which causes frequent high-latency DRAM accesses.While dedicated hardware prefetchers for IMA have been explored, they target narrow access patterns and tend to introduce significant hardware complexity.Software prefetching offers a promising alternative, leveraging compiler analysis to prefetch indirection patterns.However, existing software prefetchers struggle with sparse applications due to limited loop iterations and complex IMA patterns across nested loops.We propose Magellan, a novel loop-guided software prefetcher designed to detect and schedule IMA prefetches efficiently.Magellan introduces two key innovations: (1) extracting dependence graphs across loop levels to detect complex IMA patterns and (2) capturing inner-outer loop semantics to prefetch for both current and future iterations.We evaluate Magellan on 14 memory-intensive benchmarks using real-world datasets from social networks and web graphs.Compared to the best existing IMA software prefetcher, Magellan reduces cache misses by 25% and dynamic instruction counts by 14% on average.This results in a 1.14 average speedup, with performance gains of up to 1.41.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Interconnection Networks and Systems"], "rel": ["cache", "dram", "memory", "prefetch"], "score": 4, "link": "https://doi.org/10.1145/3695053.3731054", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731054"}, {"venue": "ISCA", "year": 2025, "title": "HeterRAG: Heterogeneous Processing-in-Memory Acceleration for Retrieval-augmented Generation", "authors": "Chaoqiang Liu, Haifeng Liu, Dan Chen, Yu Huang, Yi Zhang, Wenjing Xiao, Xiaofei Liao, Hai Jin", "abstract": "By integrating external knowledge bases, Retrieval-augmented Generation (RAG) enhances natural language generation for knowledgeintensive scenarios and specialized domains, producing content that is both more informative and personalized.RAG systems typically consist of two fundamental stages: retrieval and generation.The retrieval stage experiences low bandwidth utilization due to its random and irregular memory access patterns.Meanwhile, the generation stage is also constrained by memory bandwidth limitations, which arise from involving a significant number of General Matrix-Vector Multiplications (GEMV) operations.These two stages collectively lead to memory bottlenecks within RAG systems.Recent efforts leverage HBM-based Processing-in-Memory (PIM) to accelerate conventional Large Language Models (LLMs).However, the retrieval stage incurs substantial storage overhead due to the need to maintain large-scale knowledge bases, resulting in a capacity bottleneck.Solely relying on HBM-based PIM in RAG is both costly and insufficient to meet the capacity demands.Fortunately, DIMM-based PIM provides a low-cost, high-capacity alternative that complements HBM.In this work, we propose HeterRAG, a novel heterogeneous PIM acceleration system for RAG.It combines", "topics": ["Advanced Image and Video Retrieval Techniques", "Data Management and Algorithms", "Algorithms and Data Compression"], "rel": ["hbm", "in-memory", "memory", "pim"], "score": 4, "link": "https://doi.org/10.1145/3695053.3731089", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731089"}, {"venue": "ISCA", "year": 2025, "title": "ATiM: Autotuning Tensor Programs for Processing-in-DRAM", "authors": "Yongwon Shin, Dookyung Kang, Hyojin Sung", "abstract": "Processing-in-DRAM (DRAM-PIM) has emerged as a promising technology for accelerating memory-intensive operations in modern applications, such as Large Language Models (LLMs).Despite its potential, current software stacks for DRAM-PIM face significant challenges, including reliance on hand-tuned libraries that hinder programmability, limited support for high-level abstractions, and the lack of systematic optimization frameworks.To address these limitations, we present ATiM, a search-based optimizing tensor compiler for UPMEM.Key features of ATiM include: (1) automated searches of the joint search space for host and kernel tensor programs, (2) PIM-aware optimizations for efficiently handling boundary conditions, and (3) improved search algorithms for the expanded search space of UPMEM systems.Our experimental results on UPMEM hardware demonstrate performance gains of up to 6.18 for various UPMEM benchmark kernels and 8.21 for GPT-J layers.To the best of our knowledge, ATiM is the first tensor compiler to provide fully automated, autotuning-integrated code generation support for a DRAM-PIM system.By bridging the gap between high-level tensor computation abstractions and low-level hardware-specific requirements, ATiM establishes a foundation for advancing DRAM-PIM programmability and enabling streamlined optimization.", "topics": ["Parallel Computing and Optimization Techniques", "Tensor decomposition and applications", "Computational Physics and Python Applications"], "rel": ["dram", "kernel", "memory", "pim"], "score": 4, "link": "https://doi.org/10.1145/3695053.3731096", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731096"}, {"venue": "MICRO", "year": 2025, "title": "Chasoň: Supporting Cross HBM Channel Data Migration to Enable Efficient Sparse Algebraic Acceleration", "authors": "Ubaid Bakhtiar, Amirmahdi Namjoo, Bahar Asgari", "abstract": "High bandwidth memory (HBM) equipped sparse accelerators are emerging as a new class of accelerators that offer concurrent accesses to data and parallel execution to mitigate the memory bound behavior of sparse kernels.However, because of their underlying non-zero scheduling scheme, state-of-the-art HBM-based sparse accelerators (e.g., Serpens) suffer from high resource underutilization causing suboptimal performance, and inefficiency.To solve this challenge, we propose Chaso, an HBM-based streaming accelerator for sparse kernels, specifically sparse matrix vector multiplication.Chaso supports our novel non-zero scheduling scheme called Cross-HBM Channel out-of-order (OoO) Scheduling (CrHCS) to enable data migration across HBM channels and mitigate resource underutilization.We implement Chaso on AMD Alveo U55C, achieving 301 clock frequency and evaluate it based on SuiteSparse and SNAP matrix collections.Chaso improves the resource utilization and achieves up to 8, 20.33, 11.65, and 2.67 performance improvement and 2.03, 34.72, 19.48, and 14.61 better energy efficiency over Serpens, Nvidia RTX 4090, Nvidia RTX 6000 Ada, and Intel Core i9-11980HK, respectively.The source code of Chaso is available at https://github.com/UbaidHunts/Chason.", "topics": ["Advanced Wireless Communication Techniques", "Sparse and Compressive Sensing Techniques", "Tensor decomposition and applications"], "rel": ["hbm", "kernel", "memory", "migration"], "score": 4, "link": "https://doi.org/10.1145/3725843.3756086", "oa": "https://dl.acm.org/doi/pdf/10.1145/3725843.3756086"}, {"venue": "ASPLOS", "year": 2025, "title": "CXLfork: Fast Remote Fork over CXL Fabrics", "authors": "Chloe Alverti, Stratos Psomadakis, Burak Ocalan, Shashwat Jaiswal, Tianyin Xu, Josep Torrellas", "abstract": "The shared and distributed memory capabilities of the emerging Compute Express Link (CXL) interconnect urge us to rethink the traditional interfaces of system software. In this paper, we explore one such interface: remote fork using CXL-attached shared memory for cluster-wide process cloning. We present CXLfork, a remote fork interface that realizes close to zero-serialization, zero-copy process cloning across nodes over CXL fabrics. CXLfork utilizes globally-shared CXL memory for cluster-wide deduplication of process states. It also enables fine-grained control of state tiering between local and CXL memory. We use CXLfork to develop CXL-porter, an efficient horizontal autoscaler for serverless functions deployed on CXL fabrics. CXLfork minimizes cold-start overhead without sacrificing local memory. CXLfork attains restore latency close to that of a local fork, outperforming state-of-practice by 2.26x on average, and reducing local memory consumption by 87% on average.", "topics": ["Interconnection Networks and Systems", "Parallel Computing and Optimization Techniques", "Distributed and Parallel Computing Systems"], "rel": ["cxl", "memory", "tier"], "score": 3, "link": "https://doi.org/10.1145/3676641.3715988", "oa": "https://doi.org/10.1145/3676641.3715988"}, {"venue": "ASPLOS", "year": 2025, "title": "Necro-reaper: Pruning away Dead Memory Traffic in Warehouse-Scale Computers", "authors": "Sotiris Apostolakis, Chris Kennelly, Xinliang Li, Parthasarathy Ranganathan", "abstract": "Memory bandwidth is emerging as a critical bottleneck in warehouse-scale computing (WSC). This work reveals that a significant portion of memory traffic in WSC is surprisingly unnecessary, consisting of needless writebacks of deallocated data and fetches of uninitialized data. This issue is particularly acute in WSC, where short-lived heap allocations bigger than a cache line are prevalent. To address this problem, this work proposes a pragmatic approach tailored to WSC. Leveraging the existing WSC ecosystem of vertical integration, profile-guided compilation flows, and customized memory allocators, this work presents Necro-reaper, a novel software/hardware co-design that avoids dead memory traffic without requiring the hardware tracking of prior work. New ISA instructions enable the hardware to avoid unnecessary dead traffic, while extended software components, including a profile-guided compiler and memory allocator, optimize the utilization of these instructions. Evaluation across a diverse set of 10 WSC workloads demonstrates that Necro-reaper achieves a geomean memory traffic reduction of 26% and a geomean IPC increase of 6%.", "topics": ["Advanced Data Storage Technologies", "Interconnection Networks and Systems", "Parallel Computing and Optimization Techniques"], "rel": ["allocator", "cache", "memory"], "score": 3, "link": "https://doi.org/10.1145/3676641.3716007", "oa": "https://doi.org/10.1145/3676641.3716007"}, {"venue": "ASPLOS", "year": 2025, "title": "Robustness Verification for Checking Crash Consistency of Non-volatile Memory", "authors": "Zhilei Han, Fei He", "abstract": "The emerging non-volatile memory (NVM) technologies provide competitive performance with DRAM and ensure data persistence in the event of system failure. However, it exhibits weak behaviour in terms of the order in which stores are committed to NVMs, and therefore requires extra efforts from developers to flush pending writes. To ensure correctness of this error-prone task, it is crucial to develop a rigid method to check crash consistency of programs running on NVM devices. Most existing solutions are testing-based and rely on user guidance to dynamically detect such deficiencies. In this paper, we present a fully automated method to verify robustness, a newly established property for ensuring crash consistency of such programs. The method is based on the observation that, reachability of a post-crash non-volatile state under a given pre-crash execution can be reduced to validity of the pre-crash execution with additional ordering constraints. Our robustness verification algorithm employs a search-based framework to explore all partial executions and states, and checks if any non-volatile state is reachable under certain pre-crash execution. Once a reachable non-volatile state is obtained, we further check its reachability under memory consistency model. The algorithm is implemented in a prototype tool PMVerify that leverages symbolic encoding of the program and utilizes an SMT solver to efficiently explore all executions and states. The method is integrated into the DPLL(T) framework to optimize the robustness checking algorithm. Experiments on the PMDK example benchmark show that PMVerify is competitive with the state-of-the-art dynamic tool, PSan, in terms of robustness violation detection.", "topics": ["Radiation Effects in Electronics", "Formal Methods in Verification", "Security and Verification in Computing"], "rel": ["dram", "memory", "nvm"], "score": 3, "link": "https://doi.org/10.1145/3669940.3707269", "oa": "https://dl.acm.org/doi/pdf/10.1145/3669940.3707269?download=true"}, {"venue": "ASPLOS", "year": 2025, "title": "Systematic CXL Memory Characterization and Performance Analysis at Scale", "authors": "Jinshu Liu, Hamid Hadian, Yuyue Wang, Daniel S. Berger, Marie Nguyen, Xun Jian, Sam H. Noh, Huaicheng Li", "abstract": "Compute Express Link (CXL) has emerged as a pivotal interconnect for memory expansion. Despite its potential, the performance implications of CXL across devices, latency regimes, processors, and workloads remain underexplored. We present Melody, a framework for systematic characterization and analysis of CXL memory performance. Melody builds on an extensive evaluation spanning 265 workloads, 4 real CXL devices, 7 latency levels, and 5 CPU platforms. Melody yields many insights: workload sensitivity to sub-μs CXL latencies (140-410ns), the first disclosure of CXL tail latencies, CPU tolerance to CXL latencies, a novel approach (SPA) for pinpointing CXL bottlenecks, and CPU prefetcher inefficiencies under CXL.", "topics": ["CCD and CMOS Imaging Sensors", "Parallel Computing and Optimization Techniques", "Advanced Memory and Neural Computing"], "rel": ["cxl", "memory", "prefetch"], "score": 3, "link": "https://doi.org/10.1145/3676641.3715987", "oa": "https://doi.org/10.1145/3676641.3715987"}, {"venue": "HPCA", "year": 2025, "title": "Push Multicast: A Speculative and Coherent Interconnect for Mitigating Manycore CPU Communication Bottleneck", "authors": "Jiayi Huang, Yanhua Chen, Zhe Wang, Christopher J. Hughes, Yufei Ding, Yuan Xie", "abstract": "As CPUs scale up to many cores, the bandwidth of the network-on-chip (NoC) and cache can soon become the performance bottleneck. In modern processors, the cache hierarchy plays a reactive role to supply data upon request. In parallel programs, shared data accesses from different cores at different times can consume large cache and NoC bandwidth for the same data. These same-data accesses inherently have redundancy and lead to inefficient cache and NoC bandwidth utilization. In this work, we propose Push Multicast, a speculative and coherent interconnect. We transform the last-level cache into a proactive agent to push data to other sharers upon replying to the demand requester. Pushing enables effective multicasting to reduce LLC and NoC bandwidth consumption. A coherent innetwork filter is proposed to prune the outstanding requests in the routers along the way of the pushed data delivery. Moreover, a dynamic mechanism is designed to pause and resume pushing adaptively. Compared with a system with an L1 Bingo data prefetcher and an L2 Stride prefetcher, Push Multicast achieves an average of $\\mathbf{3 3 \\%}$ NoC bandwidth saving, a geomean of $1.02 \\times$ and a maximum of $1.56 \\times$ speedup in a 16 -core system. In a 64-core system, it further achieves an average of $\\mathbf{4 3 \\%}$ NoC bandwidth saving, along with a geomean of $1.11 \\times$ and a maximum of $2.08 \\times$ speedup.", "topics": ["Interconnection Networks and Systems", "Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies"], "rel": ["cache", "coheren", "prefetch"], "score": 3, "link": "https://doi.org/10.1109/hpca61900.2025.00115", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Machine Learning-Guided Memory Optimization for DLRM Inference on Tiered Memory", "authors": "Jie Ren, Bin Ma, Shuangyan Yang, Benjamin Francis, Ehsan K. Ardestani, Min Si, Li Dong", "abstract": "Deep learning recommendation models (DLRMs) are widely used in industry, and their memory capacity requirements reach the terabyte scale. Tiered memory architectures provide a cost-effective solution but introduce challenges in embedding-vector placement due to complex embedding-access patterns. We propose RecMG, a machine learning (ML)-guided system for vector caching and prefetching on tiered memory. RecMG accurately predicts accesses to embedding vectors with long reuse distances or few reuses. The design of RecMG focuses on making ML feasible in the context of DLRM inference by addressing unique challenges in data labeling and navigating the search space for embedding-vector placement. By employing separate ML models for caching and prefetching, plus a novel differentiable loss function, RecMG narrows the prefetching search space and minimizes on-demand fetches. Compared to state-of-the-art temporal, spatial, and ML-based prefetchers, RecMG reduces on-demand fetches by $2.2 \\times, 2.8 \\times$, and $1.5 \\times$, respectively. In industrial-scale DLRM inference scenarios, RecMG effectively reduces end-to-end DLRM inference time by up to 43%.", "topics": ["Neural Networks and Applications"], "rel": ["memory", "prefetch", "tier"], "score": 3, "link": "https://doi.org/10.1109/hpca61900.2025.00121", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Concord: Rethinking Distributed Coherence for Software Caches in Serverless Environments", "authors": "Jovan Stojkovic, Chloe Alverti, André Furugen Cesar de Andrade, Nikoleta Iliakopoulou, Hubertus Franke, Tianyin Xu, Josep Torrellas", "abstract": "Costly accesses to global storage substantially limit the performance of serverless functions. To mitigate this overhead, data can be cached in the memory of the nodes where functions are executed. Existing caching schemes either (1) restrict a data item to be cached in a single node, causing frequent remote reads or (2) allow a data item to be cached in multiple nodes concurrently, adding substantial overhead to maintain cache coherence. Unfortunately, current approaches are suboptimal for the access patterns present in serverless workloads, which are characterized by frequent reads to small data items, strong temporal locality, and a small number of nodes that concurrently execute functions of the same application. Driven by these insights, we propose Concord, a distributed software caching system tailored to serverless environments. Concord allows multiple copies of the same data item to be cached in different nodes concurrently, allowing each cache to satisfy local reads. To maintain coherence across software caches, Concord proposes a directory-based distributed coherence protocol. The protocol is inspired by hardware cache coherence, and is enhanced to minimize coherence traffic, reduce contention points, and be robust to node failures and frequent coherence domain changes. Further, with the Concord coherence protocol, we unlock two new capabilities in serverless environments: transactional storage accesses and transparent data-aware function placement. Compared to state-of-the-art severless caching schemes, Concord running on a 16-node cluster speeds-up execution by 2.4 × and improves throughput by 1.7 ×, while using only 6.2MB of otherwise idle application memory (i.e., 4.8% of the total application memory).", "topics": ["Service-Oriented Architecture and Web Services", "Software System Performance and Reliability", "Distributed and Parallel Computing Systems"], "rel": ["cache", "coheren", "memory"], "score": 3, "link": "https://doi.org/10.1109/hpca61900.2025.00043", "oa": ""}, {"venue": "ISCA", "year": 2025, "title": "Oaken: Fast and Efficient LLM Serving with Online-Offline Hybrid KV Cache Quantization", "authors": "Minsu Kim, Seongmin Hong, Ryeowook Ko, Soongyu Choi, Hunjong Lee, Junsoo Kim, Joo-Young Kim, Jongse Park", "abstract": "Modern Large Language Model (LLM) serving system batches multiple requests to achieve high throughput, while batching attention operations is challenging, rendering memory bandwidth a critical bottleneck.Today, to mitigate this issue, the community relies on high-end GPUs with multiple high-bandwidth memory (HBM) channels.Unfortunately, HBM's high bandwidth often comes at the expense of limited memory capacity, necessitating systems to scale, which reduces core utilization and increases costs.Moreover, recent advancements enabling longer contexts for LLMs have substantially increased the key-value (KV) cache size, further intensifying the pressures on memory capacity.To lower the pressure, the literature has explored KV cache quantization techniques, which commonly use low bitwidth (e.g., INT4) for most values, selectively using higher bitwidth (e.g., FP16) for outlier values.While this approach helps achieve high accuracy and low bitwidth simultaneously, it comes with the limitation that the cost for online outlier detection is excessively high, negating the advantages of quantization.Inspired by these insights, we propose Oaken, an acceleration solution that achieves high accuracy and high performance simultaneously through co-designing algorithm and hardware.To effectively find a sweet spot in the accuracy-performance trade-off space of KV cache quantization, Oaken employs an online-offline hybrid approach, setting outlier thresholds offline, which are then used to determine the quantization scale online.To translate the proposed algorithmic technique into tangible performance gains, Oaken also comes with custom quantization/dequantization engines and memory management units that can be integrated with any LLM accelerators.We built an Oaken accelerator on top of", "topics": ["Caching and Content Delivery", "Algorithms and Data Compression", "Advanced Data Storage Technologies"], "rel": ["cache", "hbm", "memory"], "score": 3, "link": "https://doi.org/10.1145/3695053.3731019", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731019"}, {"venue": "ISCA", "year": 2025, "title": "WindServe: Efficient Phase-Disaggregated LLM Serving with Stream-based Dynamic Scheduling", "authors": "Jie Feng, Yukai Huang, Rui Zhang, Sicheng Liang, Ming Yan, Jie Wu", "abstract": "Existing large language model (LLM) serving systems typically batch the compute-bound prefill and I/O-bound decoding phases together.This co-location approach not only leads to significant interference between the two phases but also limits resource allocation and placements.To address these limitations, recent work proposes disaggregating the prefill and decoding phases to enhance performance.However, these works often rely on coarse-grained static scheduling strategies, resulting in imbalanced and insufficient resource utilization.For instance, compute resources for the prefill phase may be overloaded while those for the decoding phase remain idle, resulting in performance bottlenecks.In this paper, we propose WindServe, an efficient phase disaggregated LLM serving system that leverages stream-based, finegrained dynamic scheduling to enhance resource utilization and performance.WindServe features a global scheduler that monitors compute and memory resource usage to dynamically orchestrate cross-phase jobs, effectively reducing queuing delay and KV cache swapping overhead.We also introduce a stall-free rescheduling strategy to saturate the memory resources while minimizing the scheduling overhead from KV cache transfers.Furthermore, we design a stream-based approach to mitigate interference between prefill and decoding jobs.Our evaluation demonstrates that Wind-Serve achieves remarkable stability and SLO attainment under highload scenarios, outperforming state-of-the-art phase-disaggregated LLM serving systems by delivering a 4.28 improvement in TTFT median latency and a 1.5 reduction in TPOT P99 latency.", "topics": ["Microgrid Control and Optimization", "Smart Grid Energy Management", "Smart Grid Security and Resilience"], "rel": ["cache", "disaggreg", "memory"], "score": 3, "link": "https://doi.org/10.1145/3695053.3730999", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3730999"}, {"venue": "ISCA", "year": 2025, "title": "H2-LLM: Hardware-Dataflow Co-Exploration for Heterogeneous Hybrid-Bonding-based Low-Batch LLM Inference", "authors": "Cong Li, Yihan Yin, Xintong Wu, Jingchen Zhu, Zhen-Ran Gao, Dimin Niu, Qiang Wu, Xin Si", "abstract": "Low-batch large language model (LLM) inference has been extensively applied to edge-side generative tasks, such as personal chat helper, virtual assistant, reception bot, private edge server, etc. To efficiently handle both prefill and decoding stages in LLM inference, near-memory processing (NMP) enabled heterogeneous computation paradigm has been proposed. However, existing NMP designs typically embed processing engines into DRAM dies, resulting in limited computation capacity, which in turn restricts their ability to accelerate edge-side low-batch LLM inference. To tackle this problem, we propose H2-LLM, a Hybrid-bondingbased Heterogeneous accelerator for edge-side low-batch LLM inference. To balance the trade-off between computation capacity and bandwidth intrinsic to hybrid-bonding technology, we proposeH2-LLM's architecture and extract its architecture design space. We further propose a data-centric dataflow abstraction to fully exploit the heterogeneous architecture's acceleration opportunities in low-batch LLM inference. Based on the whole design space, we propose a design space exploration (DSE) framework to automatically find out the optimal design. Compared with existing in-die NMP-based heterogeneous accelerators, H2-LLM achieves 2.72× geomean speedup and 1.48× geomean better energy efficiency. H2- LLM's data-centric dataflow exploration framework is open-sourced at https://github.com/leesou/H2-LLM-ISCA-2025. © 2025 Copyright held by the owner/author(s).<br/><br/>", "topics": ["Advancements in Photolithography Techniques", "VLSI and Analog Circuit Testing", "Machine Learning in Materials Science"], "rel": ["dram", "hybrid-bond", "memory"], "score": 3, "link": "https://doi.org/10.1145/3695053.3731008", "oa": ""}, {"venue": "ISCA", "year": 2025, "title": "Profile-Guided Temporal Prefetching", "authors": "Mengming Li, Qijun Zhang, Yu-Ang Gao, Wenji Fang, Yao Lu, Yongqing Ren, Zhiyao Xie", "abstract": "Temporal prefetching shows promise for handling irregular memory access patterns, which are common in data-dependent and pointer-based data structures.Recent studies introduced on-chip metadata storage to reduce the memory traffic caused by accessing metadata from off-chip DRAM.However, existing prefetching schemes struggle to efficiently utilize the limited on-chip storage.An alternative solution, software indirect access prefetching, remains ineffective for optimizing temporal prefetching.In this work, we propose Prophet-a hardware-software codesigned framework that leverages profile-guided methods to optimize metadata storage management.Prophet profiles programs using counters instead of traces, injects hints into programs to guide metadata storage management, and dynamically tunes these hints to enable the optimized binary to adapt to different program inputs.Prophet is designed to coexist with existing hardware temporal prefetchers, delivering efficient, high-performance solutions for frequently executed workloads while preserving the original runtime scheme for less frequently executed workloads.Prophet outperforms the state-of-the-art temporal prefetcher, Triangel, by 14.23%, effectively addressing complex temporal patterns where prior profile-guided solutions fall short (only achieving 0.1% performance gain).Prophet delivers superior performance across all evaluated workload inputs, introducing negligible profiling, analysis, and instruction overhead.", "topics": ["Parallel Computing and Optimization Techniques", "Algorithms and Data Compression", "Advanced Data Storage Technologies"], "rel": ["dram", "memory", "prefetch"], "score": 3, "link": "https://doi.org/10.1145/3695053.3731070", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731070"}, {"venue": "ISCA", "year": 2025, "title": "OptiPIM: Optimizing Processing-in-Memory Acceleration Using Integer Linear Programming", "authors": "Jiantao Liu, Minxuan Zhou, Yue Pan, Chien-Yi Yang, Lana Josipović, Tajana Rosing", "abstract": "Processing-in-memory (PIM) accelerators provide superior performance and energy efficiency to conventional architectures by minimizing off-chip data movement and exploiting extensive internal memory bandwidth for computation.However, efficient PIM acceleration requires careful software-hardware mapping that transforms application algorithms into PIM operations and data layout.Unfortunately, existing PIM accelerators adopt manually tuned heuristics or exhaustive search to determine the mappings on PIM accelerators, leading to under-optimized performance and/or long optimization time.In this work, we propose OptiPIM, a novel optimization framework based on Integer Linear Programming (ILP) to efficiently generate the optimal mapping for data-intensive applications on PIM accelerators.The proposed framework adopts a PIM-friendly mapping representation with accurate cost modeling and a concise description of the entire design space, allowing us to formulate an efficient and effective ILP problem and optimize the mapping on PIM architectures.We implement OptiPIM in the opensource MLIR framework, enabling OptiPIM to generate optimized mappings for PyTorch workloads on PIM accelerators.We evaluate widely used machine learning workloads on two state-of-the-art PIM accelerators.Our experiments show that OptiPIM can generate optimal mappings within 4 minutes.Mappings generated by OptiPIM are at least 1.9 faster than those generated by heuristics.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Memory and Neural Computing", "Advanced Neural Network Applications"], "rel": ["in-memory", "memory", "pim"], "score": 3, "link": "https://doi.org/10.1145/3695053.3731041", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731041"}, {"venue": "ISCA", "year": 2025, "title": "Light-weight Cache Replacement for Instruction Heavy Workloads", "authors": "Saba Mostofi, Setu Gupta, Ahmad Hassani, Krishnam Tibrewala, Elvira Teran, Paul V. Gratz, Daniel A. Jiménez", "abstract": "The last-level cache (LLC) is the last chance for memory accesses from the processor to avoid the costly latency of accessing the main memory.In recent years, an increasing number of instruction heavy workloads have put pressure on the last-level cache.We find that, for instruction heavy workloads, a simple replacement policy with minimal overhead provides at least the same benefit as a stateof-the-art, high-overhead replacement policy in the presence of aggressive prefetching.Our proposal is based on specifying insertion and promotion vectors (IPVs) as a generalization of re-reference interval prediction (RRIP) in such a way that the space of feasible policies may be searched exhaustively to find the best policy for the training set of workloads.The policies are formulated to deliver the best performance taking into account demand and prefetch accesses.We show that our technique, Prefetch Aware Coarse-grained Insertion and Promotion Vectors (PACIPV), improves performance over a state-of-the-art LLC replacement policy (Mockingjay) for instruction heavy workloads, and remains competitive for data heavy workloads with significantly less hardware overhead.We show that RRIP-based IPVs are very easy to implement but outperform far more complex replacement policies.PACIPV achieves a speedup of 3.3% over the baseline of LRU, outperforming SRRIP by 1.1% and the much more hardware intensive Mockingjay by 0.1%.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Distributed and Parallel Computing Systems"], "rel": ["cache", "memory", "prefetch"], "score": 3, "link": "https://doi.org/10.1145/3695053.3730993", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3730993"}, {"venue": "ISCA", "year": 2025, "title": "Hybrid SLC-MLC RRAM Mixed-Signal Processing-in-Memory Architecture for Transformer Acceleration via Gradient Redistribution", "authors": "Chang Eun Song, Prabal Bhatnagar, Zihan Xia, Nam Sung Kim, Tajana Rosing, Mingu Kang", "abstract": "Transformers, while revolutionary, face challenges due to their demanding computational cost and large data movement.To address this, we propose HyFlexPIM, a novel mixed-signal processingin-memory (PIM) accelerator for inference that flexibly utilizes both single-level cell (SLC) and multi-level cell (MLC) RRAM technologies to trade-off accuracy and efficiency.HyFlexPIM achieves efficient dual-mode operation by utilizing digital PIM for highprecision and write-intensive operations while analog PIM for high parallel and low-precision computations.The analog PIM further distributes tasks between SLC and MLC PIM operations, where a single analog PIM module can be reconfigured to switch between two operations (SLC/MLC) with minimal overhead (<1% for area & energy).Critical weights are allocated to SLC RRAM for high accuracy, while less critical weights are assigned to MLC RRAM to maximize capacity, power, and latency efficiency.However, despite employing such a hybrid mechanism, brute-force mapping on hardware fails to deliver significant benefits due to the limited proportion of weights accelerated by the MLC and the noticeable degradation in accuracy.To maximize the potential of our hybrid hardware architecture, we propose an algorithm co-optimization technique, called gradient redistribution, which uses Singular Value Decomposition (SVD) to decompose and truncate matrices based on their importance, then fine-tune them to concentrate significance into a small subset of weights.By doing so, only 5-10% of the weights have dominantly large gradients, making it favorable for HyFlexPIM by minimizing the use of expensive SLC RRAM while maximizing the efficient MLC RRAM.Our evaluation shows that HyFlexPIM significantly enhances computational throughput and energy efficiency, achieving maximum 1.86 and 1.45 higher than state-of-the-art methods.", "topics": ["Advanced Memory and Neural Computing", "Ferroelectric and Negative Capacitance Devices", "Semiconductor materials and devices"], "rel": ["in-memory", "memory", "pim"], "score": 3, "link": "https://doi.org/10.1145/3695053.3731109", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731109"}, {"venue": "MICRO", "year": 2025, "title": "ρHammer: Reviving RowHammer Attacks on New Architectures via Prefetching", "authors": "Weijie Chen, Shan Tang, Yulin Tang, Xiapu Luo, Yinqian Zhang, Weizhong Qiang", "abstract": "Rowhammer is a critical vulnerability in dynamic random access memory (DRAM) that continues to pose a significant threat to various systems. However, we find that conventional load-based attacks are becoming highly ineffective on the most recent architectures such as Intel Alder and Raptor Lake. In this paper, we present $ρ$Hammer, a new Rowhammer framework that systematically overcomes three core challenges impeding attacks on these new architectures. First, we design an efficient and generic DRAM address mapping reverse-engineering method that uses selective pairwise measurements and structured deduction, enabling recovery of complex mappings within seconds on the latest memory controllers. Second, to break through the activation rate bottleneck of load-based hammering, we introduce a novel prefetch-based hammering paradigm that leverages the asynchronous nature of x86 prefetch instructions and is further enhanced by multi-bank parallelism to maximize throughput. Third, recognizing that speculative execution causes more severe disorder issues for prefetching, which cannot be simply mitigated by memory barriers, we develop a counter-speculation hammering technique using control-flow obfuscation and optimized NOP-based pseudo-barriers to maintain prefetch order with minimal overhead. Evaluations across four latest Intel architect
