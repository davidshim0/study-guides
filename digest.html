 Optimization Techniques", "Distributed systems and fault tolerance"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1145/3676641.3716004", "oa": "https://doi.org/10.1145/3676641.3716004"}, {"venue": "ASPLOS", "year": 2025, "title": "FLEXPROF: Flexible, Side-Channel-Free Memory Access", "authors": "Jarrett Minton, Rajeev Balasubramonian", "abstract": "Secure processors must defend against a wide array of microarchitecture side-channels, including those induced by a shared memory controller. Multiple studies have proposed techniques that allocate ''turns'' (within the memory controller) to each co-scheduled virtual machine (VM), and introduce gaps between VM turns to prevent resource conflicts and side-channels. In spite of past advancements in secure memory scheduling, the elimination of side-channels imposes a performance slowdown of 2x. We observe that one of the causes of this slowdown is that the memory controller schedule accommodates the worst case, i.e., it is prepared to handle either reads or writes. The key insight in this work is that the schedule can be more efficient if we designate every turn to handle fixed patterns of reads and writes.In particular, we introduce a read-optimized turn and a write-optimized turn. Coarse-grain application profiling helps determine how often the two types of turns are invoked, without leaking sensitive information. We also add flexibility so that a read-optimized turn can opportunistically also issue writes, and vice versa. This provides a good balance between restrictions and flexibility; between throughput and utilization. The proposed FlexProf memory controller improves performance by up to 33% with a geometric mean gain of 8% on mixed workloads, relative to state-of-the-art methods. Over half the memory-intensive programs evaluated exhibit performance gains of over 10%.", "topics": ["Security and Verification in Computing", "Semiconductor materials and devices", "Advanced Memory and Neural Computing"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1145/3676641.3715997", "oa": "https://doi.org/10.1145/3676641.3715997"}, {"venue": "HPCA", "year": 2025, "title": "Efficient Memory Side-Channel Protection for Embedding Generation in Machine Learning", "authors": "Muhammad Umar, Akhilesh Parag Marathe, Monami Dutta Gupta, Shubham Jogprakash Ghosh, G. Edward Suh, Wenjie Xiong", "abstract": "Modern machine learning (ML) models need to process both continuous and categorical/discrete feature values, e.g., deep learning recommendation models (DLRMs) rely on users’ categorical features to make recommendations, and large language models (LLMs) take discrete words/tokens as input. ML models process such discrete features by converting them to numerical vectors called embeddings. Unfortunately, embedding table lookups are vulnerable to side-channel attacks, as table indices leak input feature values. Due to the size of the embedding tables, using conventional oblivious computing techniques such as ORAM to protect memory access patterns to the tables incur significant overhead. In this paper, we propose to use a different technique, Deep Hash Embedding (DHE), to secure embedding table accesses, even though it is not commonly used today due to its compute-intensive nature. We investigate three embedding generation methods with side-channel protection: linear scan of the embedding table, embedding table protected by ORAM, and DHE. Our experiments on DLRMs and LLMs show that DHE or a hybrid scheme combining DHE and linear scan can significantly improve both performance and memory footprint compared to the conventional ORAM protection. For DLRM on Criteo datasets, our hybrid scheme improves performance by about $4 \\times$ for large embedding tables, and up to $3.08 \\times$ end-to-end over the optimized ORAM baseline without any loss in accuracy, while reducing the model memory footprint by up to $1116 \\times$. For a GPT-2 LLM, using DHE speeds up the prompt prefill by up to $1.32 \\times$ and decoding by up to $1.07 \\times$ over ORAM, depending on the batch size, with comparable output quality.", "topics": ["Cryptographic Implementations and Security", "Optical Network Technologies", "Wireless Signal Modulation Classification"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00041", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Chronus: Understanding and Securing the Cutting-Edge Industry Solutions to DRAM Read Disturbance", "authors": "Oğuzhan Canpolat, A. Giray Yağlıkçı, Geraldo F. Oliveira, Ataberk Olgun, Nisa Bostancı, İsmail Emir Yüksel, Haocong Luo, Oğuz Ergin", "abstract": "Read disturbance in modern DRAM is an important robustness (security, safety, and reliability) problem, where repeatedly accessing (hammering) a row of DRAM cells (DRAM row) induces bitflips in other physically nearby DRAM rows. Shrinking technology node size exacerbates DRAM read disturbance over generations. To help mitigate read disturbance, the latest DDR5 specifications (as of April 2024) introduced a new RowHammer mitigation framework, called Per Row Activation Counting (PRAC). PRAC 1) enables the DRAM chip to accurately track row activations by allocating an activation counter per row and 2) provides the DRAM chip with the necessary time window to perform RowHammer-preventive refreshes by introducing a new back-off signal. Unfortunately, no prior work rigorously studies PRAC’s security guarantees and overheads. In this paper, we 1) present the first rigorous security, performance, energy, and cost analyses of PRAC and 2) propose Chronus, a new mechanism that addresses PRAC’s two major weaknesses. Our analysis shows that PRAC’s system performance overhead on benign applications is non-negligible for modern DRAM chips and prohibitively large for future DRAM chips that are more vulnerable to read disturbance. We identify two weaknesses of PRAC that cause these overheads. First, PRAC increases critical DRAM access latency parameters due to the additional time required to increment activation counters. Second, PRAC performs a constant number of preventive refreshes at a time, making it vulnerable to an adversarial access pattern, known as the wave attack, and consequently requiring it to be configured for significantly smaller activation thresholds. To address PRAC’s two weaknesses, we propose a new on-DRAM-die RowHammer mitigation mechanism, Chronus. Chronus 1) updates row activation counters concurrently while serving accesses by separating counters from the data and 2) prevents the wave attack by dynamically controlling the number of preventive refreshes performed. Our performance analysis shows that Chronus’s system performance overhead is near-zero for modern DRAM chips and very low for future DRAM chips. Chronus outperforms three variants of PRAC and three other state-of-the-art read disturbance solutions. We discuss Chronus’s and PRAC’s implications for future systems and foreshadow future research directions. To aid future research, we open-source our Chronus implementation at https://github.com/CMU-SAFARI/Chronus.", "topics": ["3D IC and TSV technologies", "Advanced Data Storage Technologies"], "rel": ["dram"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00071", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "NVMePass: A Lightweight, High-performance and Scalable NVMe Virtualization Architecture with I/O Queues Passthrough", "authors": "Yiquan Chen, Jin Zhen, Yijing Wang, Yi Chen, Jiexiong Xu, Hao Yu, Jinlong Chen, Wenhai Lin", "abstract": "Most data-intensive applications currently run on NVMe storage, and virtualization is essential in cloud computing. Existing NVMe virtualization technologies include software-based and hardware-assisted. Virtio suffers from severe performance degradation, and polling-based solutions consume too many valuable CPU resources. Hardware-assisted solutions provide high performance and no CPU usage but have the challenges of developing dedicated hardware.In this paper, we propose NVMePass, a novel software-hardware co-design NVMe passthrough virtualization architecture designed to achieve high performance and no CPU overhead while maintaining high scalability. The key ideas of NVMePass are NVMe I/O queues passthrough for VMs and a mechanism to ensure security. The NVMePass supports DMA and interrupts remapping for VMs without hypervisor involvement, eliminating virtualization overhead and providing near-native performance. Isolation is achieved by I/O queues and logical block address resources exclusively allocated to VMs. We propose NVMe Resource Domain (NRD) and implement it in the NVMe controller to intercept illegal I/O requests. Thus, isolation and security are fully achieved. Results from our experiments show that NVMePass can provide comparable performance to VFIO, with an IOPS of $\\mathbf{1 0 0. 1 \\% - 1 0 0. 5 \\%}$ of VFIO. Furthermore, compared to SPDK-Vhost, NVMePass achieves $\\mathbf{4 0. 0 \\%}$ lower latency when running 150 VMs, and NVMePass has an improvement of $\\mathbf{6 8. 0 \\%}$ OPS performance in a real-world application when running 100 VMs.", "topics": ["Software-Defined Networks and 5G", "Software System Performance and Reliability", "Cloud Computing and Resource Management"], "rel": ["nvm"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00105", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "GSArch: Breaking Memory Barriers in 3D Gaussian Splatting Training via Architectural Support", "authors": "Houshu He, Gang Li, Fangxin Liu, Li Jiang, Xiaoyao Liang, Zhuoran Song", "abstract": "3D Gaussian Splatting (3DGS) introduces a novel methodology for representing scenes with anisotropic 3D Gaussian primitives, achieving exceptional quality and rendering speed in neural scene representation (NSR). However, the insufficient training speed of 3DGS limits its applicability in tasks that require online learning to perceive dynamic environments, such as autonomous driving and embodied intelligence. Although recent work, GSCore, has introduced a specialized accelerator for the rendering process of 3DGS, it overlooks the time-consuming backward propagation during 3DGS training.In this paper, we propose GSArch, a hardware architecture designed to overcome memory barriers and boost the efficiency of 3DGS training. Through a thorough characterization of 3DGS training, we identify three root causes of inefficiency: redundant data loading from off-chip memory, time-consuming atomic write operations, and severe bank conflicts during on-chip buffer reading. To address these challenges, GSArch introduces three architectural innovations. First, acknowledging that Gaussians vary in shape and often span multiple pixels, with larger Gaussians causing more repetitive data loading, GSArch employs hybrid memory management. This approach categorizes Gaussians into ‘hot’ and ‘cold’ ones, storing hot Gaussians in a fast but small on-chip buffer to reduce redundant loading while minimizing hardware costs. Second, GSArch leverages the informativeness variability of Gaussians’ gradients to filter out low-contribution gradients, significantly reducing atomic operations. Lastly, a rearrangement unit is designed to pack conflicting memory read requests into non-conflicting bundles. Our evaluation results demonstrate that GSArch achieves up to $6.49 \\times$ and $15.42 \\times$ speedups compared to Nvidia A100 and Jetson AGX Xavier, respectively, with substantially lower energy consumption and negligible image quality loss.", "topics": ["3D Surveying and Cultural Heritage", "Image Processing and 3D Reconstruction"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00037", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Zebra: Efficient Redundant Array of Zoned Namespace SSDs Enabled by Zone Random Write Area (ZRWA)", "authors": "Tianyang Jiang, Guangyan Zhang, Xiaojian Liao, Yuqi Zhou", "abstract": "Zoned Namespace (ZNS) SSDs have emerged as a promising solution for eliminating device-level garbage collection and achieving predictable performance through the zone abstraction, which supports append-only writes. However, integrating ZNS SSDs into RAID configurations presents challenges, particularly concerning partial parity updates (PPUs) due to the no-overwrite property of ZNS SSDs. Existing solutions introduce dedicated metadata zones to manage PPUs, but these zones become performance bottlenecks, especially under high PPU workloads.In this paper, we introduce Zebra, a novel architecture for ZNS RAID that leverages the Zone Random Write Area (ZRWA) feature of modern ZNS SSDs. Our key insight is that the SSD’s write buffer (or ZRWA) in front of each zone is ideal for PPUs that exhibit a repeated sequential overwrite I/O pattern. By ensuring that the parity chunk fits within the ZRWA window, Zebra enables efficient PPUs within the ZRWA. Combined with a set of techniques, Zebra ensures both high performance and reliability. We evaluate Zebra on both large-zone and small-zone ZNS SSDs, two typical ZNS models. Our experiments with micro and application benchmarks show that Zebra improves the throughput by 1.1×-4.2× compared to RAIZN, a state-of-the-art ZNS RAID system.", "topics": ["Advanced Data Storage Technologies", "Caching and Content Delivery", "Network Packet Processing and Optimization"], "rel": ["ssd"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00052", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Multi-Dimensional Vector ISA Extension for Mobile In-Cache Computing", "authors": "Alireza Khadem, Daichi Fujiki, Huajuan Chen, Yufeng Gu, Nishil Talati, Scott Mahlke, Reetuparna Das", "abstract": "", "topics": ["Caching and Content Delivery", "Distributed and Parallel Computing Systems", "Service-Oriented Architecture and Web Services"], "rel": ["cache"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00045", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Mascot: Predicting Memory Dependencies and Opportunities for Speculative Memory Bypassing", "authors": "Karl H. Mose, Sebastian S. Kim, Alberto Ros, Timothy M. Jones, Robert Mullins", "abstract": "Memory-dependence prediction (MDP) increases instruction-level parallelism (ILP) by allowing load instructions to be issued even when addresses in the store queue are unknown. The predictor determines whether a load will alias with a prior store, delaying issue when a dependence is predicted. Speculative memory bypassing (SMB) further enhances ILP by short-circuiting a predicted dependence to forward the value written by a store to a load that is predicted to depend on it, without their addresses necessarily being known. This breaks data dependencies on the load and store addresses, allowing loads to obtain their values much earlier than they normally would. To obtain benefits, dependencies must be predicted with high accuracy. Furthermore, the benefits are skewed, with false negatives being more costly for performance than false positives for MDP, since the former requires squashing when the misprediction is identified, whereas the latter only delays the issue of independent loads. For SMB, on the other hand, false positives are very costly, as they require squashing, whereas false negatives have little impact in the presence of an accurate memory dependence predictor. Due to these differing requirements, the designs of predictors for these mechanisms have diverged. In this paper, we propose Mascot, a novel predictor capable of performing both MDP and SMB. MASCOT is inspired by the TAGE predictor, widely used in branch prediction. Although TAGE has proven effective as a universal predictor structure, we demonstrate how prior TAGE-based MDP or SMB predictors suffer from inaccuracy due to not learning patterns of non-dependence. By learning the context for dependencies as well as non-dependencies, Mascot achieves sufficiently low false negatives and false positives to perform MDP and SMB, while at the same time uses less space than existing designs that only perform MDP or SMB. Our simulation results show that for SPEC CPU 2017, MAscot used for MDP alone yields an IPC gain of ${0. 4 \\%}$ over the previous state-of-the-art predictor, on average, at the same size. When used for both MDP and SMB, it yields an increase in IPC of 1.9% on average, with peak gains of 26%. A compacted version of Mascot, Mascot-opt, achieves similar numbers within 0.1% while using just 10.1 KiB of space.", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00016", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Enterprise Class Modular Cache Hierarchy", "authors": "C. R. Walters, Deanna Berger, Robert Sonnelitter, Alper Buyuktosunoglu", "abstract": "The IBM Z® platform is optimized for processing vast amounts of data and transactions with low latency in a highly virtualized and secured environment. The platform and its microprocessor chip are designed to deliver consistent system performance, throughput, and response latencies with sustained processor utilization of over $\\mathbf{9 0 \\%}$ under all workload conditions. The IBM Telum® and IBM Telum® ${ }^{\\circledR}$ II designs introduced a novel modular and scalable cache hierarchy to the industry that is extendable to future platform generations, the adoption of emerging technologies, and new architecture enhancements, all of which are required to meet the continuously evolving needs of the mission critical workloads that run on the platform. This paper demonstrates the flow of processor fetch events and how the adaptive horizontal cache persistence algorithms work in this novel design. It explores the performance and system effects of cache size changes in this architecture. Finally, the paper explores how the resulting application of solutions leveraging these effects enhances the robustness of the next generation IBM Z caching solution embedded in the IBM Telum® II Processor, which improves mission critical workload performance while simultaneously enabling the generative AI capability.", "topics": ["Business Process Modeling and Analysis"], "rel": ["cache"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00093", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "Reviving In-Storage Hardware Compression on ZNS SSDs through Host-SSD Collaboration", "authors": "Yingjia Wang, Tao Lű, Yuhong Liang, Xiang Chen, Ming-Chang Yang", "abstract": "Zoned Namespace (ZNS) is an emerging SSD interface with great potential for performance and cost in largescale cloud SSD deployments. Enabling in-storage hardware compression on ZNS SSDs is promising for further enhancing the cost-effectiveness of ZNS-based storage infrastructures. However, based on our investigation, existing solutions based on the host-transparent methodology are sub-optimal on ZNS SSDs due to two intrinsic challenges: (1) locating compressed chunks and (2) harvesting space savings from compression.In this paper, we for the first time revisit the compression storage system architecture on the emerging ZNS SSD and propose to decouple compression execution with indexing. We propose CCZNS (CC: collaborative compression), an advanced ZNS interface that revives in-storage hardware compression on ZNS SSDs through a novel host-SSD collaborative approach. We present how CCZNS can benefit host software by performing a case study on RocksDB and ZenFS. Extensive experiments demonstrate that the CCZNS-based storage system significantly outperforms existing system solutions.", "topics": ["Advanced Data Storage Technologies", "Digital Rights Management and Security"], "rel": ["ssd"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00053", "oa": ""}, {"venue": "HPCA", "year": 2025, "title": "HSMU-SpGEMM: Achieving High Shared Memory Utilization for Parallel Sparse General Matrix-Matrix Multiplication on Modern GPUs", "authors": "Min Wu, Huizhang Luo, Fenfang Li, Yiran Zhang, Zhuo Tang, Kenli Li, Jeff Zhang, Chubo Liu", "abstract": "Sparse general matrix-matrix multiplication (SpGEMM) is a core primitive for numerous scientific applications. Traditional hash-based approaches fail to strike a balance between reducing hash collisions and efficiently utilizing fast shared memory, which significantly undermines the performance of executing SpGEMM on GPUs. To address this issue, this paper introduces a novel accumulator design that achieves high shared memory utilization on modern GPUs. For the proposed high shared memory utilization algorithm, i.e., HSMU-SpGEMM<sup xmlns:mml=\"http://www.w3.org/1998/Math/MathML\" xmlns:xlink=\"http://www.w3.org/1999/xlink\">1</sup>, we further optimize different symbolic stages. Our evaluations with four state-of-the-art hash-based SpGEMM libraries (Nsparse, spECK, OpSparse, and NVIDIA’s cuSPARSE) on three NVIDIA GPUs (Ampere, Ada Lovelace, Turing) demonstrate significant performance benefits from HSMU-SpGEMM.<sup xmlns:mml=\"http://www.w3.org/1998/Math/MathML\" xmlns:xlink=\"http://www.w3.org/1999/xlink\">1</sup>HSMU-SpGEMM is available at https://github.com/wuminqaq/HSMUSpGEMM", "topics": ["Parallel Computing and Optimization Techniques", "Distributed and Parallel Computing Systems", "Interconnection Networks and Systems"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1109/hpca61900.2025.00109", "oa": ""}, {"venue": "ISCA", "year": 2025, "title": "The XOR Cache: A Catalyst for Compression", "authors": "Zhewen Pan, Joshua San Miguel", "abstract": "", "topics": ["Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies", "Algorithms and Data Compression"], "rel": ["cache"], "score": 1, "link": "https://doi.org/10.1145/3695053.3730995", "oa": ""}, {"venue": "ISCA", "year": 2025, "title": "Unified Memory Protection with Multi-granular MAC and Integrity Tree for Heterogeneous Processors", "authors": "Sunho Lee, Seonjin Na, Jeongwon Choi, Jinwon Pyo, Jaehyuk Huh", "abstract": "Recent system-on-a-chip (SoC) architectures for edge systems incorporate a variety of processing units, such as CPUs, GPUs, and NPUs.Although hardware-based memory protection is crucial for the security of edge systems, conventional mechanisms experience a significant performance degradation in such heterogeneous SoCs due to the increased memory traffic with diverse access patterns from different processing units.To mitigate the overheads, recent studies, targeting a specific domain such as machine learning software or accelerator, proposed techniques based on custom granularities applicable either to counters or MACs, but not both.In response to this challenge, we propose a unified mechanism to support both multi-granular MACs and counters in a device-independent way.It supports a granularity-aware integrity tree to make it adaptable to various access patterns.The multi-granular tree architecture stores both coarse-grained and fine-grained counters at different levels in the tree.Combined with the multi-granularity technique for MACs.Our optimization technique, termed multi-granular MAC&tree, supports four different levels of granularity.Its dynamic detection mechanism can select the most appropriate granularity for different memory regions accessed by heterogeneous processing units.In addition, we combine the multi-granularity support with the prior subtree approaches to further reduce the overheads.Our simulationbased evaluation results show that the multi-granular MAC and tree reduce the execution time by 14.2% from the conventional fixed-granular MAC&tree.By combining prior sub-tree techniques, the multi-granular MAC and tree finally reduce the execution time by 21.1% compared to the conventional fixed-granular MAC&tree.", "topics": ["Advanced Data Storage Technologies", "Parallel Computing and Optimization Techniques", "Security and Verification in Computing"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1145/3695053.3731066", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731066"}, {"venue": "ISCA", "year": 2025, "title": "WarmCache: Exploiting STT-RAM Cache for Low-Power Intermittent Systems", "authors": "Noureldin Hassan, Byounguk Min, Changhee Jung, Yan Solihin, Jongouk Choi", "abstract": "This paper introduces WarmCache, an optimized STT-RAM cache design with relaxed non-volatility, for an energy harvesting system (EHS) to avoid such compulsory misses across power failure.The key insight is that if the retention time of a cache is longer than a power outage period, the cache contents can be preserved, thereby preventing compulsory misses.Based on this insight, WarmCache leverages a STT-RAM cache with reduced thermal stability to preserve non-volatility during power outages while not persisting any data.To mitigate retention failure that may occur in the relaxed STT-RAM cache, WarmCache lets its compiler partition program into a series of regions and conducts region-level error correction.At each region boundary, WarmCache verifies the execution of the region by scrubbing updated cache lines and re-executes it if any multi-bit error is detected therein.For optimization, WarmCache compiler introduces a novel region formation technique that adjusts the size of each region to match the scrubbing interval.This is achieved through region stitching for combining shorter regions and region splitting for dividing longer regions.Our experiments demonstrate that WarmCache manages to avoid compulsory cache misses and improves the performance by 1.31.4x on average compared to the state-of-the-art cache design for EHS.", "topics": ["Parallel Computing and Optimization Techniques", "Embedded Systems Design Techniques", "Energy Harvesting in Wireless Networks"], "rel": ["cache"], "score": 1, "link": "https://doi.org/10.1145/3695053.3731049", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731049"}, {"venue": "ISCA", "year": 2025, "title": "EOD: Enabling Low Latency GNN Inference via Near-Memory Concatenate Aggregation", "authors": "Taehwan Kim, Yunki Han, Seohye Ha, Jiwan Kim, Lee‐Sup Kim", "abstract": "As online services based on graph databases increasingly integrate with machine learning, serving low-latency Graph Neural Network (GNN) inference for individual requests has become a critical challenge.Real-time GNN inference services operate in an inductive setup, which can handle newly added, previously unseen nodes and their edges.In this setup, the system must prepare the computational graph and input node features for target nodes, followed by GNN inference using the given input data.However, the workflow of a GNN serving system presents two key challenges that hinder low-latency inference.The first challenge arises from the extensive preparation step, which involves heavy memory access in host memory and significant data I/O to devices, constituting the largest portion of end-to-end inference latency.The second challenge is the well-known neighborhood explosion problem in GNN research.As the receptive field for target nodes increases exponentially with the number of layers, this issue exacerbates overall latency.To address these challenges, we propose a Near-Memory Processing (NMP) based low-latency GNN inference serving system named EOD.To ensure low-latency real-time GNN service, we co-design the algorithm and hardware to tackle the aforementioned issues.First, to mitigate the neighborhood explosion problem, we propose a precomputation method for the training node set, reducing memory access and computational complexity from exponential to linear growth.Additionally, we introduce a concatenated ZVC compression method to minimize the overhead of storing precomputed hidden features.Finally, to alleviate heavy host-side memory access and data I/O, we design an NMP architecture that enables efficient aggregation on concatenated ZVC-compressed data.As a result, EOD achieves a geometric mean of 981.1 and 912.0 aggregation speedup over the baseline and the existing architecture for GNN aggregation.Additionally, EOD achieves a geometric mean of 17.9, and up to 74.3 end-to-end latency speedup over the GPU baseline.", "topics": ["Advanced Neural Network Applications", "Advanced Graph Neural Networks", "Domain Adaptation and Few-Shot Learning"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1145/3695053.3731083", "oa": "https://dl.acm.org/doi/pdf/10.1145/3695053.3731083"}, {"venue": "MICRO", "year": 2025, "title": "Leveraging Chiplet-Locality for Efficient Memory Mapping in Multi-Chip Module GPUs", "authors": "Junhyeok Park, Sungbin Jang, Osang Kwon, Yongho Lee, Seokin Hong", "abstract": "", "topics": ["Parallel Computing and Optimization Techniques", "Interconnection Networks and Systems", "Graph Theory and Algorithms"], "rel": ["memory"], "score": 1, "link": "https://doi.org/10.1145/3725843.3756090", "oa": ""}, {"venue": "MICRO", "year": 2025, "title": "Software Prefetch Multicast: Sharer-Exposed Prefetching for Bandwidth Efficiency in Manycore Processors", "authors": "Yanhua Chen, Jiong Feng, Zhe Wang, Christopher J. Hughes, Jiayi Huang", "abstract": "", "topics": ["Interconnection Networks and Systems", "Parallel Computing and Optimization Techniques", "Advanced Data Storage Technologies"], "rel": ["prefetch"], "score": 1, "link": "https://doi.org/10.1145/3725843.3756049", "oa": "https://doi.org/10.1145/3725843.3756049"}, {"venue": "MICRO", "year": 2025, "title": "NetSparse: In-Network Acceleration of Distributed Sparse Kernels", "authors": "Gerasimos Gerogiannis, Dimitrios Merkouriadis, Charles Block, Annus Zulfiqar, Filippos Tofalos, Muhammad Shahbaz, Josep Torrellas", "abstract": "", "topics": ["Cloud Computing and Resource Management", "Software-Defined Networks and 5G", "Stochastic Gradient Optimization Techniques"], "rel": ["kernel"], "score": 1, "link .1145/3725843.3756037", "oa": ""}]</script>
<script>
const P=JSON.parse(document.getElementById('data').textContent);
const KEY='paperDigestState'; let ST=JSON.parse(localStorage.getItem(KEY)||'{}');
function saveST(){localStorage.setItem(KEY,JSON.stringify(ST));}
let st={q:'',v:new Set(),y:new Set(),rel:false,state:'todo'};
const STATES=[['todo','To review'],['want','★ Want'],['skip','✕ Skipped'],['done','✓ Done'],['all','All']];
const venues=[...new Set(P.map(p=>p.venue))].sort(), years=[...new Set(P.map(p=>String(p.year)))].sort().reverse();
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function counts(){const c={todo:0,want:0,skip:0,done:0};P.forEach(p=>{c[ST[p.title]||'todo']++;});return c;}
function stateBar(){const c=counts();document.getElementById('states').innerHTML=STATES.map(([k,l])=>`<button class="chip${st.state===k?' on':''}" data-st="${k}">${l} <span style="opacity:.55;font-family:var(--mono);font-size:11px">${k==='all'?P.length:c[k]}</span></button>`).join('');}
function facets(){let h='<span class="rels">Venue</span>';
  venues.forEach(v=>h+=`<button class="chip v${st.v.has(v)?' on':''}" data-v="${v}">${v}</button>`);
  h+='<span class="rels" style="margin-left:8px">Year</span>';
  years.forEach(y=>h+=`<button class="chip y${st.y.has(y)?' on':''}" data-y="${y}">${y}</button>`);
  document.getElementById('facets').innerHTML=h;}
function visible(){return P.filter(p=>{
  if(st.state!=='all'&&(ST[p.title]||'todo')!==st.state)return false;
  if(st.rel&&p.score===0)return false;
  if(st.v.size&&!st.v.has(p.venue))return false;
  if(st.y.size&&!st.y.has(String(p.year)))return false;
  if(st.q){const b=(p.title+' '+p.abstract+' '+p.authors).toLowerCase();if(!b.includes(st.q))return false;}
  return true;});}
function card(p,i){const id='p'+i;const s=ST[p.title]||'';
  const topics=(p.topics||[]).map(t=>`<span class="tag r">${esc(t)}</span>`).join('');
  const rels=p.rel&&p.rel.length?`<span class="rels">matches: ${p.rel.map(esc).join(', ')}</span>`:'';
  const oa=p.oa?`<a class="lnk oa" href="${p.oa}" target="_blank">free PDF ↗</a>`:'';
  const lnk=p.link?`<a class="lnk" href="${p.link}" target="_blank">page ↗</a>`:'';
  return `<div class="card${s?(' '+s):''}" data-t="${esc(p.title)}">
    <div class="meta"><span class="score s${p.score?'':'0'}">${p.score} hit${p.score===1?'':'s'}</span>
      <span class="tag v">${esc(p.venue)}</span><span class="tag y">${p.year}</span>${topics}</div>
    <h3>${esc(p.title)}</h3><div class="authors">${esc(p.authors)||'—'}</div>
    <div class="abs clip" id="${id}">${esc(p.abstract)||'<i>no abstract found</i>'}</div>
    ${p.abstract&&p.abstract.length>320?`<button class="more" data-x="${id}">show more ▾</button>`:''}
    <div class="foot"><div class="states" data-t2="${esc(p.title)}"><button class="sbtn want${s==='want'?' on':''}" data-s="want">★ want</button><button class="sbtn skip${s==='skip'?' on':''}" data-s="skip">✕ skip</button><button class="sbtn done${s==='done'?' on':''}" data-s="done">✓ done</button></div>${oa}${lnk}${rels}</div></div>`;}
function render(){stateBar();facets();const vis=visible();
  document.getElementById('list').innerHTML=vis.map(card).join('');
  document.getElementById('empty').style.display=vis.length?'none':'block';
  document.getElementById('count').textContent=vis.length+' shown';
  document.getElementById('copy').textContent='Copy ★ want ('+counts().want+')';}
document.getElementById('q').addEventListener('input',e=>{st.q=e.target.value.toLowerCase();render();});
document.getElementById('relOnly').addEventListener('click',e=>{st.rel=!st.rel;e.target.classList.toggle('on',st.rel);render();});
document.getElementById('states').addEventListener('click',e=>{const b=e.target.closest('.chip');if(b){st.state=b.dataset.st;render();}});
document.getElementById('facets').addEventListener('click',e=>{const b=e.target.closest('.chip');if(!b)return;
  if(b.dataset.v){st.v.has(b.dataset.v)?st.v.delete(b.dataset.v):st.v.add(b.dataset.v);}
  if(b.dataset.y){st.y.has(b.dataset.y)?st.y.delete(b.dataset.y):st.y.add(b.dataset.y);}render();});
document.getElementById('list').addEventListener('click',e=>{
  if(e.target.dataset.x){const el=document.getElementById(e.target.dataset.x);el.classList.toggle('clip');e.target.textContent=el.classList.contains('clip')?'show more ▾':'show less ▴';return;}
  const sb=e.target.closest('.sbtn');
  if(sb){const t=sb.closest('.states').dataset.t2,s=sb.dataset.s;if(ST[t]===s)delete ST[t];else ST[t]=s;saveST();render();}});
document.getElementById('copy').addEventListener('click',()=>{const t=P.filter(p=>ST[p.title]==='want').map((x,i)=>(i+1)+'. '+x.title).join('\n');
  navigator.clipboard.writeText(t).then(()=>{const b=document.getElementById('copy');b.textContent='Copied!';setTimeout(render,1200);});});
render();
</script></body></html>
